character_id: aqiang
nodes:
  # ========================================
  # 第一幕：初见 - 焦急的最后一单
  # ========================================

  - event_id: aqiang_001_dialogue_main
    trigger_condition:
      need_event: []
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 木门被推开。
          - 没有风铃声。
          - 一个浑身湿透的年轻人站在门口，深蓝色的速运制服贴在身上。
          - 左胸口的白色logo已经被雨水泡得模糊。
          - 右太阳穴有一道青紫的撞伤，但他似乎完全没有察觉到。
          - 他的怀里紧紧护着什么，用左手手臂压着。
      - type: npc
        content:
          - 「......有酒吗？」
          - 「......快点。」
      - type: env
        content:
          - 他的手指在碎裂的手机屏幕上机械地滑动。
          - 屏幕上的裂纹像蛛网，但导航还在运行。
      - type: inner
        content:
          - 这个人......浑身湿透了。像是从雨里直接跑进来的。
          - 他在赶什么？
    player_options:
      - option: 「外面雨很大，要不要先擦一擦？」
        text: 「外面雨很大，要不要先擦一擦？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「不用。我很快就走。」
              - 「......送完这单就走。」
        next_node: aqiang_002_dialogue_main
        impact_log: 关心他的状态
      - option: 「您这是......速运员？这么晚还在跑？」
        text: 「您这是......速运员？这么晚还在跑？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......嗯。速运。」
              - 「最后一单了。」
        next_node: aqiang_002_dialogue_main
        impact_log: 询问职业
    next_node: aqiang_002_dialogue_main

  - event_id: aqiang_002_dialogue_main
    trigger_condition:
      need_event:
        - aqiang_001_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他低头看了一眼手机屏幕，眉头紧锁。
      - type: npc
        content:
          - 「......还有多远来着。」
          - 「导航......不准了。」
      - type: env
        content:
          - 他的手指在胸口的位置停留了一下......
          - 那里有个硬硬的轮廓，像是一个小盒子。
      - type: inner
        content:
          - 他好像在确认什么东西还在不在。
      - type: npc
        content:
          - 「......不是快递。」
          - 「是......要亲手交给她的东西。」
    player_options:
      - option: 「是要送给谁吗？」
        text: 「是要送给谁吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......嗯。」
              - 「......我妹妹。」
          - type: env
            content:
              - 提到"妹妹"的时候，他的语气突然慢了下来。
        impact_log: 询问收件人
      - option: 「导航怎么不准了？」
        text: 「导航怎么不准了？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......不知道。」
              - 「一直显示还有两公里。」
              - 「但我怎么都到不了。」
        impact_log: 询问导航问题
    next_node: aqiang_003_drink_request

  - event_id: aqiang_003_drink_request
    trigger_condition:
      need_event:
        - aqiang_002_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他又看了一眼手机屏幕。
          - 时间显示：17:58。
          - 不知道为什么，那个数字似乎停住不动了。
      - type: npc
        content:
          - 「......这酒。」
          - 「......能让我想起她的吗。」
      - type: env
        content:
          - 他的声音突然变得很轻。
      - type: inner
        content:
          - 「让她想起她」......他在说什么？
    player_options: []
    next_node: null
    drink_request:
      keywords: ["焦急", "赶时间", "未完成", "遗憾", "妹妹"]
      hint: 他下意识地摸了摸胸口的位置，像在确认什么东西还在。那里似乎装着什么硬质的东西——像是一个小盒子。他的手机屏幕碎裂，但导航还在运行。

  # ========================================
  # 第一幕：调酒结果
  # ========================================

  - event_id: aqiang_phase1_success
    trigger_condition:
      need_event:
        - aqiang_003_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他接过酒杯，抿了一口。
          - 眉头微微松开了一点。
      - type: npc
        content:
          - 「......这酒。」
          - 「......像是要送给重要的人的东西。」
      - type: env
        content:
          - 他又看了一眼胸口的位置。
      - type: npc
        content:
          - 「......我得走了。」
          - 「......她还在等我。」
    player_options: []
    next_node: null
    diary_note: "一个浑身湿透的速运员，胸口紧紧护着什么东西。他说\"最后一单\"，说\"妹妹还在等\"。雨那么大，愿他平安到达。"
    on_success:
      next_phase: 2

  - event_id: aqiang_phase1_fail
    trigger_condition:
      need_event:
        - aqiang_003_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他一口喝了大半杯，叹了口气。
      - type: npc
        content:
          - 「......谢谢。」
          - 「我得走了。」
    player_options: []
    next_node: null
    diary_note: "阿相喝完就走了。他总是很急，赶着去送那最后一单......胸口的硬物，是送给妹妹的礼物吗？"
    on_success:
      next_phase: idle

  # ========================================
  # 第二幕：破冰 - 一百六十七单
  # ========================================

  - event_id: aqiang_004_dialogue_main
    trigger_condition:
      need_event:
        - aqiang_phase1_success
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他再次出现在门口。
          - 这次，工服已经干了，但磨损得更明显了。
          - 右肘的位置薄得几乎要透光，补丁打了三层。
          - 但他眼底的疲惫，却比上次更深。
      - type: npc
        content:
          - 「......我又来了。」
          - 「......还剩两公里。」
      - type: env
        content:
          - 他的手机夹在车把支架上，屏幕上的裂纹更大了。
          - 但他似乎完全没有注意到。
      - type: inner
        content:
          - 又是这句话......"还剩两公里"。
          - 他到底要送去哪里？
    player_options:
      - option: 「两公里......听起来不远？」
        text: 「两公里......听起来不远？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......很近。」
              - 「但我走了很久。」
          - type: env
            content:
              - 他的语气很奇怪。
              - 像是在说一个他自己也不明白的事实。
        next_node: aqiang_005_dialogue_main
        impact_log: 询问距离
      - option: 「您的制服......好像穿了很久了？」
        text: 「您的制服......好像穿了很久了？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......三年。」
              - 「多跑一单，她的钢琴就近一寸。」
          - type: env
            content:
              - 提到"她"的时候，他的语气突然软了下来。
        next_node: aqiang_005_dialogue_main
        impact_log: 注意到制服磨损
    next_node: aqiang_005_dialogue_main

  - event_id: aqiang_005_dialogue_main
    trigger_condition:
      need_event:
        - aqiang_004_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他的手指无意识地摩挲着胸口的位置。
      - type: npc
        content:
          - 「......一百六十七单。」
          - 「......我数过。每一单都数过。」
      - type: inner
        content:
          - 一百六十七单......他在说什么？
      - type: npc
        content:
          - 「从付定金到结清尾款......一百六十七次出发，一百六十七次送达。」
          - 「......换来的东西。」
      - type: env
        content:
          - 他的目光落在胸口的位置。
      - type: npc
        content:
          - 「......她喜欢《月光》。」
          - 「德彪西的《月光》。」
          - 「......她说，想听一次真正的钢琴。」
      - type: inner
        content:
          - 《月光》......他妹妹想要的，是一首钢琴曲。
          - 但他胸口的东西，显然不是钢琴......
      - type: npc
        content:
          - 「......我还差得远。」
          - 「钢琴太贵了。八万。」
          - 「......但音乐盒......三万。我能攒够。」
    player_options:
      - option: 「三万......一百六十七单？」
        text: 「三万......一百六十七单？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......嗯。」
              - 「一单大概三百日元。」
              - 「要跑很多很多趟。」
          - type: env
            content:
              - 他的语气很平淡，像是在说一件很普通的事。
        next_node: aqiang_006_drink_request
        impact_log: 询问一百六十七单
      - option: 「她一定很期待。」
        text: 「她一定很期待。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......」
              - 「她很懂事。」
              - 「从来不向我要什么。」
              - 「但我看到过......她在橱窗前站了很久。」
              - 「......她以为我没看见。」
          - type: env
            content:
              - 他的声音突然变得很轻。
              - 像是想起了什么。
        next_node: aqiang_006_drink_request
        impact_log: 共情妹妹
    next_node: aqiang_006_drink_request

  - event_id: aqiang_006_drink_request
    trigger_condition:
      need_event:
        - aqiang_005_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他望着窗外的夜色，目光变得有些遥远。
      - type: npc
        content:
          - 「......今天是她生日。」
      - type: env
        content:
          - 他的声音突然变得很轻。
      - type: inner
        content:
          - 今天是她生日......
          - 他这么着急，原来是因为这个。
      - type: npc
        content:
          - 「......我要送到。」
          - 「......一定要送到。」
    player_options: []
    next_node: null
    drink_request:
      keywords: ["牵挂", "思念", "家人", "妹妹", "生日"]
      hint: 他说"一百六十七次出发，一百六十七次送达"。他的妹妹想要一架钢琴，但他只能先买得起一个音乐盒。今天是她18岁生日。

  # ========================================
  # 第二幕：调酒结果
  # ========================================

  - event_id: aqiang_phase2_success
    trigger_condition:
      need_event:
        - aqiang_006_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他端起酒杯，一口喝了大半。
          - 眼眶有些泛红......
      - type: npc
        content:
          - 「......这酒。」
          - 「......像小时候的味道。」
          - 「......爸染布的时候......」
          - 「......不说了。我得走了。」
      - type: env
        content:
          - 他放下酒杯，目光落在胸口的位置。
      - type: npc
        content:
          - 「......快了。」
          - 「......就快到了。」
    player_options: []
    next_node: null
    diary_note: "阿相喝酒的时候想起了小时候爸爸染布的味道。他说一百六十七单，只为给妹妹买一个音乐盒。今天是她18岁生日......真是个好哥哥。"
    on_success:
      next_phase: 3

  - event_id: aqiang_phase2_fail
    trigger_condition:
      need_event:
        - aqiang_006_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他放下酒杯，若有所思地望着窗外。
      - type: npc
        content:
          - 「......」
          - 「她等了我很久了。」
          - 「这次......不能再让她失望了。」
    player_options: []
    next_node: null
    diary_note: "阿相说不能再让\"她\"失望了。他一直在说\"就快到了\"......但为什么他说的距离，好像永远都走不完？"
    on_success:
      next_phase: idle

  # ========================================
  # 第三幕：揭露 - 那场雨
  # ========================================

  - event_id: aqiang_007_dialogue_main
    trigger_condition:
      need_event:
        - aqiang_phase2_success
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他出现在门口。
          - 这次，他的步伐慢了下来。
          - 手机屏幕上的时间似乎停在了某个数字——17:58。
      - type: npc
        content:
          - 「......」
          - 「那天......也是下雨天。」
      - type: env
        content:
          - 他的目光有些迷茫。
          - 像是想起了什么，又像是不敢去想。
      - type: inner
        content:
          - 那天的雨......他说的是什么意思？
    player_options:
      - option: 「那天......发生什么了？」
        text: 「那天......发生什么了？」
        branch_type: plot
        script_flow:
          - type: npc
            content:
              - 「......」
              - 「那天......我是去送东西的。」
        next_node: aqiang_008_dialogue_main
        impact_log: 询问那天的事
      - option: 「手机上的时间......好像停住了？」
        text: 「手机上的时间......好像停住了？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......是吗？」
              - 「......我不知道。」
              - 「我只知道......要送到。」
          - type: env
            content:
              - 他的语气有些迷茫。
        next_node: aqiang_008_dialogue_main
        impact_log: 注意到停止的时间
    next_node: aqiang_008_dialogue_main

  - event_id: aqiang_008_dialogue_main
    trigger_condition:
      need_event:
        - aqiang_007_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他从胸口小心翼翼地捧出一个小盒子。
          - 系着粉色丝带，两边长短差了将近三厘米。
          - 丝带是他自己在百元店挑了二十分钟才选定的。
      - type: npc
        content:
          - 「......没有碎。」
      - type: inner
        content:
          - 没有碎......他在说什么？
      - type: npc
        content:
          - 「一百六十七单。换来的东西。」
          - 「......」
          - 「雨很大。单价翻三倍。我想多跑几单。」
          - 「......就快到了。」
      - type: env
        content:
          - 他的声音变得很轻。
      - type: npc
        content:
          - 「我低头看了一眼手机......」
          - 「就一眼。」
      - type: inner
        content:
          - 那一瞬间......发生了什么？
      - type: npc
        content:
          - 「......然后就是车灯。」
          - 「......很大的声音。」
          - 「......」
          - 「但我只想到一件事。」
      - type: env
        content:
          - 他的左手死死地护着胸口的位置。
      - type: npc
        content:
          - 「......还好。」
          - 「......没有碎。」
      - type: inner
        content:
          - 他在说......什么？
          - 那场雨里......到底发生了什么？
    player_options:
      - option: 「......什么声音？」
        text: 「......什么声音？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......刹车声。」
              - 「......或者......撞到了什么。」
              - 「......我不记得了。」
          - type: env
            content:
              - 他的眼神有些迷茫。
          - type: npc
            content:
              - 「......但我记得我说的话。」
              - 「......还好，没有碎。」
        next_node: aqiang_009_drink_request
        impact_log: 追问细节
      - option: 「......你还好吗？」
        text: 「......你还好吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......」
              - 「我没事。」
              - 「......雪还在等我。」
              - 「......我要送到。」
          - type: env
            content:
              - 他的语气很坚定。
        next_node: aqiang_009_drink_request
        impact_log: 表达关心
    next_node: aqiang_009_drink_request

  - event_id: aqiang_009_drink_request
    trigger_condition:
      need_event:
        - aqiang_008_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他把音乐盒收回胸口的位置。
          - 动作很轻，很小心。
      - type: npc
        content:
          - 「......有一杯酒。」
          - 「......是关于那些来不及的事的。」
          - 「......你有吗？」
      - type: inner
        content:
          - 来不及的事......
          - 他说的那场雨......难道......
      - type: npc
        content:
          - 「......有些事，错过了就是错过了。」
          - 「......有些人，等不到了就是等不到了。」
          - 「......」
          - 「......但我还能送到。」
          - 「......我相信。」
    player_options: []
    next_node: null
    drink_request:
      keywords: ["遗憾", "悔恨", "来不及", "来不及的事"]
      hint: 他说"来不及的事"。他提到了那场雨，那声刹车，那句"还好，没有碎"。他的妹妹还在等他——但他好像......永远到不了了。

  # ========================================
  # 第三幕：调酒结果
  # ========================================

  - event_id: aqiang_phase3_success
    trigger_condition:
      need_event:
        - aqiang_009_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他接过酒杯，手微微发抖。
          - 喝了一口，眉头紧锁。
      - type: npc
        content:
          - 「......这酒。」
          - 「......苦中带甜。」
          - 「......像是......在愈合什么。」
      - type: inner
        content:
          - 他好像......想起了什么。
      - type: npc
        content:
          - 「......小雪......」
          - 「......对不起......」
          - 「......哥......来晚了吗......」
      - type: env
        content:
          - 他的眼眶红了。
          - 第一次，他的眉头松开了。
    player_options: []
    next_node: null
    diary_note: "阿相终于说出了\"对不起\"。他说的那场雨、那声刹车、那句\"还好，没有碎\"......我终于明白了。他一直觉得自己来晚了。但他已经......"
    on_success:
      next_phase: 4

  - event_id: aqiang_phase3_fail
    trigger_condition:
      need_event:
        - aqiang_009_drink_request
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他沉默地喝着酒。
          - 眼神飘向远方。
      - type: npc
        content:
          - 「......」
          - 「......她还在等。」
          - 「......我得走了。」
      - type: env
        content:
          - 他站起身，准备离开。
          - 但他的身影......为什么看起来有些透明？
    player_options: []
    next_node: null
