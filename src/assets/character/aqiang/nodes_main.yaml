    diary_note: "阿相走了。他终于把音乐盒送到了雪手里——不是用一百六十七单，而是用他自己的方式。他说，\"你才是那首《月光》\"。月光照耀着他们，愿他们永远在一起。"
    on_success:
      next_phase: released
      redemption_summary: |
        晴山冰相，17岁那年父亲去世，母亲精神崩溃。他撕掉国立大学有希望的成绩单，继承染坊。

        敌不过机械化印染的洪流，染坊一年后倒闭。他卖了所有器械，带着妹妹搬进祖母的老破小。

        为让有钢琴天赋的妹妹继续学琴，他什么都做：工地搬砖、便利店夜班、餐厅洗碗。最后选择了速运员——多跑一单，雪的钢琴就近一寸。

        小雪18岁生日前两个月，他终于攒够尾款，在一家手工音乐盒店买下了定制音乐盒。录有德彪西《月光》的旋律。他算过：从付定金到结清尾款，一共跑了一百六十七单。

        那天暴雨。单价翻三倍。他想多跑几单。下午五点五十八分，交叉路口。他低头看了一眼手机导航——就一眼。

        侧方驶来的卡车在湿滑路面上刹车失控。他做了一个动作：不是转向，不是刹车。而是弓起身体，左手死死护住胸口那个位置。

        "还好，"他想，"没有碎。"

        他不知道自己已经死了。他只知道雪还在等。他得把音乐盒送到她手里。

        但他永远到不了了——或者说，他以为自己永远到不了了。

        直到那天，有人告诉他：她已经收到了。不是音乐盒。是你。

        你活着的时候给她的每一天，你省下的每一口饭，你缝补了三次的制服，你站在她房门口听的每一次呼吸——这些才是真正的礼物。

        音乐盒只是一个盒子。你才是那首《月光》。

        那场雨，终于停了。
