character_id: aqiang

# 阶段完成标记
phase_completion:
  - phase: 1
    unlock_condition:
      event_id: "aqiang_phase1_success"
      description: "调酒成功后进入第二阶段"
    unlocks:
      - "aqiang_phase2_dialogue"
      - "family_bond"

  - phase: 2
    unlock_condition:
      event_id: "aqiang_phase2_success"
      description: "调酒成功后进入第三阶段"
    unlocks:
      - "aqiang_phase3_dialogue"
      - "little_snow"

  - phase: 3
    unlock_condition:
      event_id: "aqiang_phase3_success"
      description: "第三阶段调酒成功后"
    unlocks:
      - "true_story"
      - "redemption_complete"

  - released:
    unlock_condition:
      event_id: "aqiang_013_ending"
      description: "冰相获得救赎，前往彼岸"
    unlocks:
      - "full_story"

