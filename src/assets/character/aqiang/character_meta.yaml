character_id: aqiang
base_info:
  name: "阿相"
  real_name: "晴山 冰相 (Haruyama Hyousuke)"
  age: 25
  occupation: "速运员"
  identity: |
    冰相，25岁，晴山家的长子。曾是墨田区"晴山染工"的继承人。
    父亲因肺病逝于染料粉尘，母亲精神崩溃后自尽。17岁的他撕毁成绩单，继承染坊。
    染坊敌不过时代洪流倒闭后，他成为速递员，只为让妹妹小雪继续练琴。
    小雪18岁生日前两个月，他终于攒够钱买下了定制音乐盒——录有德彪西《月光》的旋律。
    那场暴雨，让他再也没能把礼物送到妹妹手中。
  description: |
    一个浑身湿透的年轻人，穿着深蓝色的速运制服。右太阳穴有一道青紫的撞伤。
    他沉默地站在门口，目光低垂。手机屏幕碎得像蛛网，但他还在不停地滑动查看导航。
    说话极少，像是在赶时间。左袖口内侧，藏着一截缝进折边的红毛线绳。
    身上的气息是雨水和疲惫混合的味道，肩背却挺得笔直。
  type: "迷失者"
  personality: "顽固、极度焦虑、自我牺牲、沉默寡言、不善表达情感"
  short_story: |
    晴山冰相，17岁那年父亲去世，母亲精神崩溃。他撕掉国立大学有希望的成绩单，继承染坊。

    敌不过机械化印染的洪流，染坊一年后倒闭。他卖了所有器械，带着妹妹搬进祖母的老破小。

    为让有钢琴天赋的妹妹继续学琴，他什么都做：工地搬砖、便利店夜班、餐厅洗碗。最后选择了速运员——多跑一单，雪的钢琴就近一寸。

    父亲曾是墨田区最好的蓝染匠人。他说要把最好的蓝色染给世界看。
    冰相没能继承父亲的蓝色，但继承了父亲的执拗——和妹妹相依为命的那一种。

    小雪18岁生日前两个月，他终于攒够尾款，在一家手工音乐盒店买下了定制音乐盒。
    录有德彪西《月光》的旋律。粉色丝带是他在百元店挑了二十分钟才选定的。
    他算过：从付定金到结清尾款，一共跑了一百六十七单。
    凌晨四点的闹钟，便利店最便宜的饭团，雨夜里湿透的制服，右肘磨穿的三层补丁。

    那天暴雨。单价翻三倍。他想多跑几单。
    下午五点五十八分，交叉路口。
    他低头看了一眼手机导航——就一眼。

    侧方驶来的卡车在湿滑路面上刹车失控。

    他做了一个动作：不是转向，不是刹车。
    而是弓起身体，左手死死护住胸口那个位置。
    那里有音乐盒。那里有他一百六十七单换来的东西。

    "还好，"他想，"没有碎。"

    他不知道自己已经死了。
    他只知道雪还在等。他得把音乐盒送到她手里。

    左袖口内侧，藏着雪12岁时系在他手腕上的"平安绳"——一段染坊废弃的红线绳。
    绳子后来磨断了，他把它缝进了袖口折边里，不希望雪知道"平安绳失效了"。

    【执念核心】

    送音乐盒这件事，说出口像是"送给妹妹的礼物"。
    但他真正放不下的，从来不是那个盒子。

    他放不下的是：雪以后只有一个人了。

    父母早就走了。祖母也老了。他这一走，就真的没有人再站在她那架看不见的钢琴旁边了。
    他不是怕死。他已经死了。
    他怕的是雪以后没有人给她做饭，没有人催她早点睡，没有人在她练琴的时候站在旁边听。

    他怕她冷了不知道加衣服。怕她下雨天不带伞。怕她被人欺负了不知道找谁哭。
    他怕她一个人在这个世界上，慢慢变成一座孤岛。

    他可以接受自己的死。
    但他没办法接受雪以后不能健健康康、安安全全、快快乐乐地活下去。

    这才是他真正执念。也是他最说不出口的痛苦。

    【与玩家的关系】

    调酒师能做什么？
    阿相不是来听大道理的。他不需要有人告诉他"你死了，你妹妹会没事的"。
    他需要的是：有人帮他相信，雪会没事的。

    他需要的不是安慰。他需要的是看到证据。
    哪怕只是一句话，一个迹象，一个让他觉得"她真的能走下去"的瞬间。

    调酒师的一杯酒，可以成为那个证据。
    不是酒本身有什么魔力，而是有些话，喝了那杯酒之后才敢说出口。

    如果玩家能在对的时候说出雪的消息，哪怕只是说"她很好"，阿相的执念就会松动一点。
    如果玩家能让阿相相信，雪以后会好好的，他会愿意放下那最后一点执念。

    但这件事急不得。他需要慢慢相信，不是一句"没事的"就能解决。

    【遗憾与未解】

    他最后悔的不是自己死了。
    是那天早上出门的时候，没有好好跟雪说一声。

    他记得那天早上，雪还在睡。他想的是"晚上回来再告诉她，给她一个惊喜"。
    结果那个"晚上"再也没来。

    他最放不下的是那句没说出口的"再见"。

death_cause: "暴雨夜护住音乐盒，被卡车撞上"
lingering_regret: "一百六十七单，音乐盒一定要送到雪手里"

