pending_phase: null

story:
  summary: >
    阿相的故事是一段被生活不断压缩却始终不肯折断的成长史。比起“牺牲”这个词，他更像是把所有重量都默默扛在自己肩上。
  chapters:
    - id: "aqiang_story_01"
      title: "蓝染坊的儿子"
      summary: "父亲离世之后，他的人生被迫从少年一下子推到了大人那一侧。"
      unlocked: true
      unlock_text: ""
      content: |
        阿相原本也曾拥有一条看上去很普通、甚至有些明亮的路。家里经营着小小的染坊，父亲手上总带着洗不掉的蓝色，嘴里说的却是很笨拙的愿望，说总有一天，要把最好的颜色染给这个世界看。那时候的他还年轻，成绩不差，也不是没有离开这里去见更大世界的可能。可父亲突然离世之后，家里像是被抽走了支撑屋梁的骨头，母亲的精神一点点垮掉，原本尚能维持的日子也很快散了。

        他撕掉成绩单，没再继续向前走那条属于“自己”的路，而是转身回到了已经摇摇欲坠的家里。染坊没能再撑多久，时代的洪流和廉价的机械印染很快就把这门旧手艺逼到了角落。他亲手卖掉器械，把熟悉的味道和颜色一起送走，也把自己原本还能犹豫的人生就此切断。从那之后，他不再是那个可以考虑未来的少年，而成了必须立刻学会撑住残局的人。
    - id: "aqiang_story_02"
      title: "为了小雪"
      summary: "他做过很多份不体面的工作，只为让妹妹还能继续朝着钢琴走下去。"
      unlocked: false
      unlock_text: "继续推进阿相与小雪相关剧情后解锁"
      content: |
        阿相后来做过许多工作，几乎没有哪一份是轻松的。工地、便利店、餐馆后厨、夜间配送，凡是能换到钱的事情他都试过。白天的疲惫和深夜的倦意一层层压下来，他却很少把这些说给谁听。因为在他心里，那些辛苦都只是账本上的数字，只要能多攒下一点，妹妹离她想要的生活就能近一点。

        小雪有钢琴的天赋，这件事他比任何人都更早看见。别人夸她弹得好时，他总是一副不太在意的样子，可真正把那些夸奖放在心里的，也是他。为了让她继续学琴，他宁愿把自己的人生按到最窄、最硬、最不好走的那条路上。很多时候，他并不是不累，也不是没有委屈，只是他把“哥哥”这个身份看得太重了。重到所有苦都可以先往后放，重到他早就习惯把自己的愿望一再往下压。
    - id: "aqiang_story_03"
      title: "生日之前"
      summary: "他以为只差最后一点，就能把答应妹妹的礼物亲手送到她面前。"
      unlocked: false
      unlock_text: "完成阿相主线后解锁"
      content: |
        在小雪十八岁生日来临之前，阿相做了一件谁都没有告诉的事。他攒了很久的钱，去定制了一个音乐盒，录进了妹妹最喜欢的旋律，又笨手笨脚地挑了很久的丝带，只为了让那份礼物看起来不像他这个人平日里那样粗糙。他把每一笔花销都算得很清楚，也把每一趟奔波都忍得很安静，仿佛只要再多撑一下，生活就真的会出现一点变好的证据。

        可命运最残忍的地方，从来不是让人没有希望，而是让人明明已经看见了希望的形状，却偏偏在伸手去够的那一刻把一切打碎。后来人们记得的是那个没有回来的人，是那份没能送出去的礼物，是妹妹漫长而固执的等待。可如果把时间拨回去，在那个还来得及出门的傍晚，阿相心里想的其实很简单。他只是想履行一个哥哥的承诺，想让妹妹知道，自己一直都把她放在最重要的位置上。
