character_id: aqiang
base_info:
  name: "阿相"
  age: 25
  occupation: "速运员"
  description: |
    一个浑身湿透的年轻人，穿着深蓝色的速运制服。右太阳穴有一道青紫的撞伤。
    他的怀里紧紧护着什么东西——一个系着粉色丝带的盒子。
    手机屏幕碎得像蛛网，但他还在不停地滑动查看导航。
    他说话语速快，像是在赶时间。
  type: "迷失者"
  short_story: |
    晴山冰相，17岁那年父亲去世，母亲精神崩溃。他撕掉国立大学有希望的成绩单，继承染坊。
    敌不过机械化印染的洪流，染坊一年后倒闭。他卖了所有器械，带着妹妹搬进祖母的老破小。
    为让有钢琴天赋的妹妹继续学琴，他什么都做：工地搬砖、便利店夜班、餐厅洗碗。
    最后选择了速运员——多跑一单，雪的电子琴就近一寸。
    父亲曾是墨田区最好的蓝染匠人。他说要把最好的蓝色染给世界看。
    冰相没能继承父亲的蓝色，但继承了父亲的执拗——和妹妹相依为命的那一种。
    18岁生日的前两个月，他终于攒够尾款，在一家手工音乐盒店买下了定制音乐盒。
    录有德彪西《月光》的旋律。粉色丝带是他在百元店挑了二十分钟才选定的。
    他算过：从付定金到结清尾款，一共跑了一百六十七单。
    那天暴雨。单价翻三倍。他想多跑几单。
    下午四点十七分，交叉路口。他低头看了一眼手机导航——就一眼。
    侧方驶来的卡车在湿滑路面上刹车失控。
    他做了一个动作：不是转向，不是刹车。而是弓起身体，左手死死护住胸口那个位置。
    那里有音乐盒。那里有他一百六十七单换来的东西。
    撞击的瞬间，他只感觉到肋骨被什么东西重重撞了一下。
    "还好，"他想，"没有碎。"
    他不知道自己已经死了。他只知道雪还在等。他得把音乐盒送到雪手里。

profile_sections:
  - id: "surface"
    title: "焦急的速运员"
    content: |
      一个浑身湿透的年轻人，穿着深蓝色的速运制服。右太阳穴有一道青紫的撞伤。
      他的怀里紧紧护着什么东西——一个系着粉色丝带的盒子。
      手机屏幕碎得像蛛网，但他还在不停地滑动查看导航。
      他说话语速快，像是在赶时间。
    unlock_condition: "obs_temple_bruise"
    depth_level: 1

  - id: "family_bond"
    title: "晴山家的孩子"
    content: |
      他是晴山家的长子，曾是墨田区"晴山染工"的继承人。
      父亲因肺病逝于染料粉尘，母亲精神崩溃后自尽。17岁的他撕毁成绩单，继承染坊。
      染坊敌不过时代洪流倒闭后，他成为速运员，只为让妹妹小雪继续练琴。
      他总说：「我什么都给不了她，除了我自己。」
    unlock_condition: "aqiang_phase1_most_loved_success"
    depth_level: 2

  - id: "music_box_chest"
    title: "胸口的重量"
    content: |
      他下意识地摸了摸胸口的位置，用左手手臂压着。
      里面装着什么硬质的东西——系着粉色丝带的盒子。
      他说"没有碎"。他似乎不知道别的，只知道要把这个东西送到。
    unlock_condition: "obs_chest_package"
    depth_level: 2

  - id: "little_snow"
    title: "小雪"
    content: |
      「她很懂事。从来不向我要什么。」
      「但我看到过...她在钢琴前站了很久，没有声音地弹着。」
      「......她以为我没看见。」
      她是他用一百六十七单换来的音乐盒要送的人。
      他答应过她的，从来没有食言过。
    unlock_condition: "aqiang_phase2_most_loved_success"
    depth_level: 2

  - id: "music_box_revelation"
    title: "月光音乐盒"
    content: |
      定制音乐盒，录有德彪西《月光》的旋律。
      粉色丝带是他在百元店挑了二十分钟才选定的——"太红的像血，太浅的像病"。
      他攒了八个月、一百六十七单才买下的。
      盒子棱角硌进肋骨的位置。他说"没有碎"。
    unlock_condition: "obs_music_box"
    depth_level: 3

  - id: "the_accident"
    title: "那个交叉路口"
    content: |
      「雨很大。单价翻三倍。我想多跑几单。」
      「下午四点十七分。我低头看了一眼导航——就一眼。」
      「侧方的卡车在湿滑路面上刹车失控。」
      他没有转向，没有刹车。他弓起身体，死死护住胸口的位置。
      "还好，"他想，"没有碎。"
    unlock_condition: "obs_broken_clock"
    depth_level: 3

  - id: "final_message"
    title: "最后的遗言"
    content: |
      「小雪，对不起，哥食言了。」
      「......但他不欠我的。是我......一直欠着他。」
      哥哥最后的话是："小雪，对不起，哥食言了。"
      但他不欠她的。是他一直在为妹妹付出，从十四岁开始。
    unlock_condition: "hidden_brother_last_words"
    depth_level: 3

  - id: "true_story"
    title: "冰相的故事"
    content: |
      晴山冰相，17岁那年父亲去世，母亲精神崩溃。他撕掉国立大学有希望的成绩单，继承染坊。

      敌不过机械化印染的洪流，染坊一年后倒闭。他卖了所有器械，带着妹妹搬进祖母的老破小。

      为让有钢琴天赋的妹妹继续学琴，他什么都做：工地搬砖、便利店夜班、餐厅洗碗。最后选择了速运员——多跑一单，雪的电子琴就近一寸。

      父亲曾是墨田区最好的蓝染匠人。他说要把最好的蓝色染给世界看。冰相没能继承父亲的蓝色，但继承了父亲的执拗。

      18岁生日的前两个月，他终于攒够尾款，在一家手工音乐盒店买下了定制音乐盒。录有德彪西《月光》的旋律。他算过：从付定金到结清尾款，一共跑了一百六十七单。

      那天暴雨。单价翻三倍。他想多跑几单。下午四点十七分，交叉路口。他低头看了一眼手机导航——就一眼。

      侧方驶来的卡车在湿滑路面上刹车失控。他做了一个动作：不是转向，不是刹车。而是弓起身体，左手死死护住胸口那个位置。

      "还好，"他想，"没有碎。"

      他不知道自己已经死了。他只知道雪还在等。他得把音乐盒送到雪手里。
    unlock_condition: "aqiang_phase3_redemption_end"
    depth_level: 3

  - id: "redemption_complete"
    title: "彼岸的重逢"
    content: |
      他在黄昏的居酒屋终于放下了那份执念。
      雨停了，路也到头了。
      他明白了——雪不需要他用命去守护什么。
      她需要他好好活着，看着她弹完那首《月光》。
      那场雨，终于停了。
    unlock_condition: "aqiang_released"
    depth_level: 3

  - id: "full_story"
    title: "完整的羁绊"
    content: |
      有些爱，即使付出生命也要送达；有些遗憾，是活着的人必须背负的重量。
      但那些爱，从来不会消失——它们会变成夜空中的光，照亮下一个迷路的人。

      晴山家的蓝色，终究没能染到世界。但雪的手中，已经有了月光。
      那是哥哥用一百六十七单换来的东西。
      那是德彪西的《月光》，也是哥哥沉默的爱。
    unlock_condition: "aqiang_released"
    depth_level: 4
