character_id: fox_uncle
nodes:
  - event_id: fox_uncle_001_dialogue_main
    trigger_condition:
      need_event: []
      need_time: W1_D1_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 风铃轻响。
          - 木门被缓缓推开。
          - 淡淡的陈年酒香先行飘入...
          - 随后是一位头戴狐狸面具的老者，拄着拐杖慢步走入。
          - 他的步伐不急不缓，像是走了千百年的路。
      - type: env
        content:
          - 葫芦轻轻晃荡，发出沉闷的声响。
          - 面具下的眼神在昏黄的灯光中闪动。
      - type: npc
        content:
          - 「呀列呀列...第一天开业啊。」
          - 「嘿嘿，这里的酒，真是香气扑鼻。」
          - 「...这味道，和以前一样啊。」
      - type: inner
        content:
          - 他说"以前"...难道他以前来过这里？
          - 可我...什么都不记得了。
    trigger_observation:
      prompt: "进来了一位神秘的大叔，还是仔细观察下吧..."
      continue_node: fox_uncle_001_dialogue_main_after_obs
      feature_groups: ["phase_1"]

  - event_id: fox_uncle_001_dialogue_main_after_obs
    trigger_condition:
      need_event:
        - fox_uncle_001_dialogue_main
      need_time: W1_D1_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 他注意到了你的小心思，脸上的微笑却更加神秘了。
      - type: inner
        content:
          - 「还是赶紧接待这位古怪的客人吧...」
    player_options:
      - option: 「想喝点什么」
        text: 「您好，请问想喝点什么？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「哈哈，服务态度不错。」
        impact_log: 以服务态度开场
      - option: 「您从哪里来的」
        text: 「您是...第一次来小店吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......」
              - 「你小子，忘性一直都那么大。」
              - 「...算了，不记得就不记得吧。」
          - type: env
            content:
              - 他的眼神锐利如刀，但语气并不责备。
          - type: npc
            content:
              - 「就当我是个熟客吧，小子，你看，这里的每一支酒杯都认得我。」
        impact_log: 好奇询问身份
      - option: 「您的面具」
        text: 「您好，现在应该不是万圣节吧？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「哈哈哈哈哈哈！小子，你这把老夫逗的。」
              - 「老夫的这面具，可不是什么万灵...哦，应该是万圣节吧！」
          - type: env
            content:
              - 他笑得眼角皱纹都舒展开来。
          - type: npc
            content:
              - 「这面具啊...是很久以前一个故人送的。」
              - 「...不过你应该不记得了哟！嘿嘿。」
        impact_log: 谦虚请求指教
    next_node: fox_uncle_001_before_teaching
 
 
  - event_id: fox_uncle_001_before_teaching
    trigger_condition:
      need_event:
        - fox_uncle_001_dialogue_main
      need_time: W1_D1_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 大叔微微颔首。
          - 眼神突然认真地看向你，目光如炬。
      - type: npc
        content:
          - 「小子，你虽坐在这吧台里，桌上这么多酒，你会调吗？」
      - type: inner
        content:
          - 看着眼前的酒杯，我翻找着我的记忆...却发现只有一片空白。
          - 「我...我明明是个调酒师，怎么会...」
      - type: npc
        content:
          - 「...果然忘了...你这小子」
          - 「没关系。」
      - type: env
        content:
          - 他轻轻叹了口气。面具下那双眼睛清澈深邃。
      - type: npc
        content:
          - 「坐下吧，小子。你不会，我就来教你。」
          - 「这第一天呢，我们从最基础的开始。」
          - 「这杯酒，不知道教过你多少次了呢。」
      - type: env
        content:
          - 他的皱纹泛起一阵涟漪。
          - 像是想起了什么很遥远的事。
      - type: npc
        content:
          - 「...也没什么。」
    player_options: []
    next_node: fox_uncle_teaching_01
  
  - event_id: fox_uncle_002_dialogue_main
    trigger_condition:
      need_event:
        - fox_uncle_001_dialogue_main
      need_time: W1_D1_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 他从腰间解下葫芦。
          - 放在桌上，轻轻晃了晃。
      - type: npc
        content:
          - 「我们开始吧。」
          - 「...别紧张。」
          - 「...老夫又不吃人。」
      - type: env
        content:
          - 他在吧台前坐定，拐杖轻轻靠在一旁。
          - 那葫芦上的花纹在灯光下若隐若现。
      - type: npc
        content:
          - 「...这第一杯，很简单。」
          - 「...但简单的东西...」
          - 「...往往最难。」
          - 「...调酒最重要的，不是技术。」
          - 「...是用心。」
    player_options:
      - option: 「我准备好了！」
        text: 「我准备好了！」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好。」
              - 「...放松点。」
              - 「...你太紧了。」
              - 「...调酒这事...要享受才行。」
        impact_log: 准备好学习
      - option: 「这配方难吗？」
        text: 「这配方难吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「不难，你要记住，难的永远是用心。」
              - 「...技术嘛...多练就会了。」
              - 「...但要是心不正...」
              - 「...调出来的酒，就少了那点味道。」
          - type: env
            content:
              - 他轻轻敲了敲桌面。
              - 像是某种无声的提醒。
        impact_log: 询问配方难度
    next_node: fox_uncle_teaching_01
  - event_id: fox_uncle_003_dialogue_main
    trigger_condition:
      need_event: []
      need_time: W1_D2_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 风铃轻响。
          - 木门再次被推开。
          - 熟悉的拐杖声响起...
          - 狐面大叔如约而至。
      - type: npc
        content:
          - 「呀列呀列...第二天了。」
          - 「今天的酒，要带点甜味。」
      - type: env
        content:
          - 他在吧台前坐下，歪着头看了看我。
          - 那面具下的眼神，似乎在打量着什么。
      - type: npc
        content:
          - 「...怎么样，小子？」
          - 「...昨天教你的，还记得吗？」
          - 「...还是说，又忘了？」
          - 「...嘿嘿。」
    player_options:
      - option: 「甜味的酒？」
        text: 「甜味的酒？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「嗯，今天教你甘酒嗨棒。」
              - 「...昨天那杯太苦了。」
              - 「今天来点甜的...缓缓。」
          - type: env
            content:
              - 他轻轻晃了晃葫芦。
              - 里面发出沉闷的声响，像是陈年的老酒。
        impact_log: 好奇甜味
      - option: 「我记得，昨天是纯米嗨棒。」
        text: 「我记得，昨天是纯米嗨棒。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「是的，那是昨天。」
              - 「...难得你还记得。」
              - 「...老夫还以为你又忘了呢。」
          - type: env
            content:
              - 他的语气里带着一丝打趣。
              - 像是在故意逗我。
        impact_log: 记得昨天的酒
      - option: 「请指教。」
        text: 「请指教。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好，今天教你甜的。」
              - 「...希望你能记住。」
              - 「...虽然老夫也不指望。」
        impact_log: 谦虚请求
    next_node: fox_uncle_003_before_teaching
  - event_id: fox_uncle_003_before_teaching
    trigger_condition:
      need_event:
        - fox_uncle_003_dialogue_main
      need_time: W1_D2_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 他满意地从腰间解下葫芦。
          - 放在桌上，轻轻拍了拍。
      - type: npc
        content:
          - 「好，开始吧。」
          - 「...今天这杯，比昨天那杯难一点。」
          - 「...但没关系，慢慢来。」
          - 「...老夫有的是耐心。」
      - type: env
        content:
          - 他的语气温和，像是在哄一个孩子。
          - 虽然话语里带着点打趣，但并不让人反感。
    player_options: []
    next_node: fox_uncle_teaching_02
  - event_id: fox_uncle_004_dialogue_main
    trigger_condition:
      need_event:
        - fox_uncle_003_dialogue_main
      need_time: W1_D2_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 他满意地从腰间解下葫芦。
          - 放在桌上，轻轻拍了拍。
      - type: npc
        content:
          - 「好，开始吧。」
          - 「...今天这杯，比昨天那杯难一点。」
          - 「...但没关系，慢慢来。」
          - 「...老夫有的是耐心。」
      - type: env
        content:
          - 他的语气温和，像是在哄一个孩子。
          - 虽然话语里带着点打趣，但并不让人反感。
    player_options:
      - option: 「甘酒...是酒酿吗？」
        text: 「甘酒...是酒酿吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「差不多，但要的就是那个甜。」
              - 「...你小子，脑子还是转得挺快的。」
              - 「...比昨天强点了。」
        impact_log: 询问甘酒
      - option: 「我准备好了！」
        text: 「我准备好了！」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好，开始吧。」
              - 「...你这小子，每次都说准备好了。」
              - 「...但下次来...还是紧张兮兮的。」
              - 「...算了，习惯就好。」
        impact_log: 准备好学习
    next_node: fox_uncle_teaching_02
  - event_id: fox_uncle_005_dialogue_main
    trigger_condition:
      need_event: []
      need_time: W1_D3_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 第三天的黄昏。
          - 夕阳透过窗户洒进来。
          - 金色的光芒给狐面大叔的面具镀上一层暖色。
          - 但今天...他的目光有些凝重。
      - type: env
        content:
          - 他望向窗外，眼神有些悠远。
          - 像是在看着某个即将到来的人。
      - type: npc
        content:
          - 「呀列呀列...三天了。」
          - 「你学得很快。」
          - 「...比上次快多了。」
      - type: inner
        content:
          - 他说"上次"...难道我以前也学过？
          - 可我...真的什么都不记得了。
      - type: npc
        content:
          - 「今天教你一杯特别的...」
          - 「...“止痛药”，酒如其名。...这杯酒，是关于那些...」
          - 「来不及，做不到，放不下的事的。」
      - type: env
        content:
          - 他的声音比平时低沉了一些。
          - 狐面下的眼神，闪过一丝悲凉。
      - type: inner
        content:
          - 来不及的事...
          - 老先生在说什么？
          - 为什么今天的他...看起来这么悲伤？
      - type: npc
        content:
          - 「...有些人，有些事...」
          - 「...错过了就是错过了...」
          - 「...没有第二次机会的...」
      - type: env
        content:
          - 他沉默了片刻，然后轻轻叹了口气。
          - 那叹息里，仿佛诉说了无尽的遗憾和无奈。
      - type: npc
        content:
         - 「看看这吧台的木头。」
      - type: env
        content:
          - 他抚摸着那隔在我俩之间的古老吧台，上面的纹路轮廓分明。
      - type: npc
        content:
          - 「人啊...心碎的时候，就跟木材裂开一样...」
          - 「顺着纹路，自上而下，完全开裂。」
          - 「...算了，不说这些了。」
          - 「...希望你永远不要遇上需要这杯酒的客人。」
    player_options:
      - option: 「老师，这到底是...」
        text: 「老师，这杯酒到底是...」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「...这居酒屋的七情六欲...」
              - 「...是多少世态炎凉。」
              - 「...每一杯酒背后，都有一个故事。」
              - 「...止痛药，是为那些在深夜里独自舔舐伤口的人调的。」
          - type: env
            content:
              - 他的声音很轻。
              - 一向稳重、看上去不谙世事，甚至有点老顽童的老师，今天却有些悲伤。
          - type: npc
            content:
              - 「...算了，来学调酒吧。」
        impact_log: 好奇七情六欲
      - option: 「我准备好了。」
        text: 「老师，不管是什么酒，我都准备好了。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好。」
              - 「...但愿你永远不需要用到这杯酒。」
              - 「...酒...本身也是无罪的。」
        impact_log: 准备好
      - option: 「老师今天...似乎有心事？」
        text: 「老师今天似乎有些不寻常。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......」
              - 「...你这小子，眼睛倒是挺尖的。」
              - 「...老夫活了这么久，看的事情多了。」
              - 「...有些事，不必多问。」
        impact_log: 注意到老师的异样
    next_node: fox_uncle_teaching_03
  - event_id: fox_uncle_007_dialogue_main
    trigger_condition:
      need_event: []
      need_time: W1_D4_Dusk
      need_item: []
    script_flow:
      - type: env
        content:
          - 第四天的黄昏。
          - 夕阳的余晖透过窗户洒进来。
          - 狐面大叔推门而入，拐杖在地板上发出沉稳的声响。
          - 今天的他，步伐比往常更慢一些。
          - 像是在思考什么。
      - type: env
        content:
          - 他在吧台前缓缓坐下。
          - 葫芦被轻轻放在桌上，发出沉闷的声响。
          - 面具下的眼神，比往日更加深邃。
      - type: npc
        content:
          - 「呀列呀列...四天了。」
          - 「你学得比老夫想象的要快。」
          - 「...纯米嗨棒、甘酒嗨棒，都记得吗？」
      - type: inner
        content:
          - 四天...我确实感觉对这些基础的酒已经有了感觉。
          - 清酒的淡、甘酒的甜...像是熟悉的老朋友。
      - type: npc
        content:
          - 「今天教你一杯完全不同的。」
          - 「...这杯酒，老夫喝了很多年。」
          - 「它叫——古典。」
      - type: env
        content:
          - 他的手指轻轻敲着桌面。
          - 像是某种节奏，又像是在回忆。
      - type: npc
        content:
          - 「威士忌为底，糖来中和，苦精点睛。」
          - 「...这是最经典的鸡尾酒之一。」
          - 「...也是老夫年轻时...最常喝的一杯。」
      - type: inner
        content:
          - 老师年轻时...难道他也有过迷茫的时候？
      - type: npc
        content:
          - 「来，开始吧。」
    player_options:
      - option: 「古典...这名字有什么含义吗？」
        text: 「古典...这名字有什么含义吗？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「古典...是因为它够老。」
              - 「...老到配方都已经记不清是谁先开始用的了。」
              - 「...但正是这份'老'，让它成了经典。」
              - 「...就像这间居酒屋一样。」
        impact_log: 询问名称含义
      - option: 「我准备好了！」
        text: 「我准备好了！」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好。」
              - 「...记住，苦精只要几滴。」
              - 「...多了就苦了，少了就淡了。」
              - 「...恰到好处，才是真的难。」
        impact_log: 准备好
      - option: 「请指教。」
        text: 「请指教。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「好，谦虚的学生。」
              - 「...这杯酒，要用心去感受那苦中带甜。」
        impact_log: 谦虚请求
    next_node: fox_uncle_teaching_05
  
