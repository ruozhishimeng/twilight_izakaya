character_id: fox_uncle
base_info:
  name: "狐面大叔"
  real_name: "稻荷"
  age: "未知"
  identity: |
    稻荷神，丰收与商业之神。居酒屋的第一任酒保，如今化作人形在黄昏时分来访，肩负教导新手调酒师的责任。袖口的稻穗刺绣透露着他的身份。
  description: |
    头戴狐狸面具的老者，拄着拐杖慢步走入。深蓝色的作务衣洗得发白，腰间挂着一个朱红色的大葫芦。脸上的面具歪歪的，像是随手一放。身上的气息...是陈年的酒香。
  type: "鬼神"
  personality: "慢节奏、慈祥、宽容、幕后老板"
  short_story: |
    他是这间店的第一任酒保，如今化作人形在黄昏时分来访。
    袖口的稻穗刺绣透露着他的身份——稻荷神，丰收与商业之神。
    上千年的岁月里，他见证了无数调酒师的成长。
    「调酒不是炫技，是让人开口说话的艺术。」每一杯酒背后都有一个故事，而他愿意做那个倾听者。
    千年守候，只为看着每一杯酒背后的故事。他曾是这间店的创始人，如今化作人形在黄昏时分来访。不为别的，只为将调酒的智慧与温柔传承下去。

