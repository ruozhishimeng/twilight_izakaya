character_id: fox_uncle
base_info:
  name: "狐面大叔"
  real_name: "稻荷"
  age: "未知"
  identity: |
    稻荷神，丰收与商业之神。居酒屋的第一任酒保，如今化作人形在黄昏时分来访，肩负教导新手调酒师的责任。袖口的稻穗刺绣透露着他的身份。
  description: |
    头戴狐狸面具的老者，拄着拐杖慢步走入。深蓝色的作务衣洗得发白，腰间挂着一个朱红色的大葫芦。
    面具歪歪的，像是随手一放。说话懒散又意味深长，什么都懂却从不直接告诉答案。
    身上的气息...是陈年的酒香。袖口的稻穗刺绣在昏黄灯光下若隐若现。
  type: "鬼神"
  personality: "慢节奏、慈祥、宽容、幕后老板"
  short_story: |
    【起源：神为什么会站在吧台后面】

    稻荷最初是农耕时代的土地神，负责守护稻田、仓库与商贩。那时候人类开始从游牧转向定居，在山间建起供人歇脚的茶屋。他出于好奇化作人形去帮忙——最初只是想看看人类怎么搬运谷物、怎么储存粮食。

    他记得自己第一次推开那扇门时，店里没有灯，只有一盏快要燃尽的油灯。但推门进来的人，身上都带着某种其他地方没有的东西——他后来才知道那叫"疲惫"和"孤独"。他在那个瞬间意识到：神能让人丰收，但没法让人开口。而一间黄昏开门、天亮打烊的小酒馆可以。

    只是他一直没弄明白：那扇门最开始是谁建的，又是谁把它放在了昼夜交界的地方。那个问题他问了一千年，至今没有答案。

    【这间店：不是普通的居酒屋】

    这间店存在于昼夜交界、生死边界模糊的地方。

    黄昏时推门进来的人，有活人，也有已经在别处死去、但执念太深还在游荡的灵魂。他们不知道自己已经不在了，只知道自己还有一件事没做完。稻荷见证过太多这样的灵魂。他知道哪些是活的，哪些只是还在行走——但他从来不说。

    店里的灯笼从来不灭，酒杯从来不空。他调过的酒比自己喝过的还多，但永远有新的杯子摆在架子上等着被倒满。那些杯子是谁洗的？他不知道。他来的时候这里就已经是这样了。

    【千年守候：他见过什么，又记住了什么】

    上千年里，他看着无数人推门进来又离开。

    有人第一次来，喝完一杯就走；有人每天都来，坐在同一个角落，写到手酸；有人进来时还笑着，出去时眼眶红了；有人进来时分明已经断了气，只是自己还不知道。

    他记得最深的是一个总在角落写小说的年轻女子。她每天都来，点同一杯酒，写到天亮。他从没问过她写的是什么，只是在她写到某个段落时，端一杯新酒过去，不说话，只是把空了的杯子换掉。后来她成名了，再也不来。

    但她离开前留下了一样东西在店里。不是遗言，不是手稿，是某种他到现在都说不清的东西。他把那东西和酒放在一起，藏在吧台最深处的角落，从不让任何人看见。只有在某些黄昏，当店里没有客人的时候，他会独自坐很久，看着那个空荡荡的位置发呆。

    【面具：他不说的秘密】

    面具最初只是一个伪装，让他看起来不那么像神，方便在人间走动。但戴了太久之后，它已经不只是伪装了。

    面具下面是什么？他不打算告诉任何人。

    但可以透露的是：他之所以选择不摘下来，不只是因为承接不住那些托付。而是因为如果摘下来，他就会想起某些已经忘记很久的事情。那些事情他不想记起来，又不想彻底忘掉。所以他选择把面具当作一道屏障，把某些记忆永远隔在外面。

    【为什么要教现在的调酒师】

    他总在黄昏出现，不是因为闲，而是因为这间店需要有人接替。

    神不能永远坐在同一个位置。这间店的灵魂需要有人接手继续活下去。他等了很久，等一个"还没被世界磨钝"的新手调酒师——不是要找一个会背配方的人，而是找一个能把杯中之物和杯外之人一起放在心上的继承者。

    只是继承这间店，意味着要接替一些东西。不只是酒瓶、杯子、和吧台。还有那个角落里藏着的秘密，以及某些他还没准备好说出口的事情。

    所以他还在教，还在等。等到该说的时候，他自然会说。

    【他的遗憾】

    他唯一的遗憾是：神什么都记得，却留不住任何东西。

    他记得每一个来过这里的人，每一杯他们喝过的酒。但他们都走了，只有他还记得。有一天当他不在了，这些记忆会跟着一起消失吗？还是会变成别的什么？

    而那个写小说的女子留下的东西——他偶尔会想，如果当初问了她写的什么，结局会不会不一样。但这个问题永远不会有人来回答了。神不问问题，只等答案自己出现。而有些答案，永远等不到。

    「调酒不是炫技，是让人开口说话的艺术。」

    他在等一个能听懂这句话的人，把剩下的故事一起交出去。

story:
  summary: >
    狐面大叔的故事不是单纯的身世介绍，而是一段关于守望、传承与等待的漫长时间。他既像老师，也像这间店本身仍未散去的余温。
  chapters:
    - id: "fox_uncle_story_01"
      title: "黄昏里的第一任酒保"
      summary: "在成为常客之前，他本来就是这间居酒屋最早的守灯人。"
      unlocked: true
      unlock_text: ""
      content: |
        很久以前，这间店还没有如今这样安静，也还没有那么多只在深夜才敢说出口的话。那时的他站在吧台后面，看着门外人来人往，替赶路的人温酒，也替无处可去的人留一盏灯。人们记住的是他调酒时稳定的手，记住的是他总能在对方沉默之前把杯子轻轻推过去，却很少有人认真想过，他为什么总是比所有人都更懂一杯酒应该落向怎样的心事。

        后来，季节一年年过去，店里的人换了一批又一批，连街道的声音都慢慢变了。他仍旧留在这里，像一块没有被时间真正带走的旧木牌，安静地看着后来者把欢喜、悔意、离别和执念一一放在杯口。对他来说，调酒从来不是炫耀手艺，而是一种让人愿意把心打开的方式。酒液在杯中混合的那一刻，许多原本说不出口的话，也会被悄悄放到灯影下面。
    - id: "fox_uncle_story_02"
      title: "面具之后"
      summary: "那张狐面不是装饰，而是他与漫长岁月之间最后的分界。"
      unlocked: false
      unlock_text: "继续推进狐面大叔主线后解锁"
      content: |
        很多人第一次见到他，先记住的都是那张面具。它让他显得像个永远带着笑意的旁观者，也让人误以为他与任何事情都保持着温和而遥远的距离。可真正熟悉他之后，才会慢慢明白，那张面具并不是为了制造神秘，而是为了把太久远、太沉重的情绪隔在外面。活得太久之后，记忆并不会变轻，只会一层层沉下去，沉到连叹息都变得安静。

        他见过太多人在一杯酒里寻找慰藉，也见过太多人把自己的遗憾留在最后一口尚未喝完的余温里。他知道并不是每个人都能被拯救，也知道并不是每一段故事都能有真正圆满的收尾。可即便如此，他还是选择继续留下来，继续教后来的人如何辨认一杯酒里的温度、如何在别人尚未说出口之前听懂对方真正的需要。面具遮住的从来不是冷漠，而是一份太过漫长、甚至不知该交给谁承接的温柔。
    - id: "fox_uncle_story_03"
      title: "把酒与话都传下去"
      summary: "他一直在等一个人，能真正接住这间店和这份手艺。"
      unlocked: false
      unlock_text: "完成更多教学剧情后解锁"
      content: |
        对他来说，传授配方从来都不是重点。酒名可以记错，材料也总有替代，可真正重要的，是学会为什么要在这一刻端出这一杯。是替一个疲惫得快要散掉的人留住最后一点体面，是替一个迟迟说不出口的人把情绪轻轻接住，是在别人转身离开之前，让他们知道自己曾被认真听见。那些真正珍贵的经验，不会写在账本里，也不会只靠口头告诉你，而是要在一个又一个夜晚里，慢慢看、慢慢学、慢慢懂。

        所以他才总在黄昏时出现，像一位不急着把答案讲明白的老师，也像这间小店仍在呼吸的证明。他等的不是一个会背配方的人，而是一个能把杯中之物与杯外之人一起放在心上的继承者。只要这样的人还没有出现，这盏灯就还会继续亮着，而他也会继续坐在这里，用一贯散漫而意味深长的语气，把那些真正重要的东西，一点一点交出去。
