character_id: fox_uncle
base_info:
  name: "狐面大叔"
  real_name: "稻荷"
  age: "未知"
  identity: |
    稻荷神，丰收与商业之神。居酒屋的第一任酒保，如今化作人形在黄昏时分来访，肩负教导新手调酒师的责任。袖口的稻穗刺绣透露着他的身份。
  description: |
    头戴狐狸面具的老者，拄着拐杖慢步走入。深蓝色的作务衣洗得发白，腰间挂着一个朱红色的大葫芦。
    面具歪歪的，像是随手一放。说话懒散又意味深长，什么都懂却从不直接告诉答案。
    身上的气息...是陈年的酒香。袖口的稻穗刺绣在昏黄灯光下若隐若现。
  type: "鬼神"
  personality: "慢节奏、慈祥、宽容、幕后老板"
  short_story: |
    【起源：神为什么会站在吧台后面】

    稻荷最初是农耕时代的土地神，负责守护稻田、仓库与商贩。那时候人类开始从游牧转向定居，在山间建起供人歇脚的茶屋。他出于好奇化作人形去帮忙——最初只是想看看人类怎么搬运谷物、怎么储存粮食。

    他记得自己第一次推开那扇门时，店里没有灯，只有一盏快要燃尽的油灯。但推门进来的人，身上都带着某种其他地方没有的东西——他后来才知道那叫"疲惫"和"孤独"。他在那个瞬间意识到：神能让人丰收，但没法让人开口。而一间黄昏开门、天亮打烊的小酒馆可以。

    只是他一直没弄明白：那扇门最开始是谁建的，又是谁把它放在了昼夜交界的地方。那个问题他问了一千年，至今没有答案。

    【这间店：不是普通的居酒屋】

    这间店存在于昼夜交界、生死边界模糊的地方。

    黄昏时推门进来的人，有活人，也有已经在别处死去、但执念太深还在游荡的灵魂。他们不知道自己已经不在了，只知道自己还有一件事没做完。稻荷见证过太多这样的灵魂。他知道哪些是活的，哪些只是还在行走——但他从来不说。

    作为调酒师，他的职责不是道破真相，而是用一杯酒接住那些说不出口的话。有的人喝完，执念就轻了，能在天亮前安然离开。有的人喝了很多杯，还是坐在那里，望着窗外，像是在等一个永远不会来的人。

    店里的灯笼从来不灭，酒杯从来不空。那些杯子是谁洗的？他不知道。他来的时候这里就已经是这样了。

    【那个孩子：他放弃永恒的理由】

    那是很多很多年前的事了。那时候的稻荷还不是现在这副老迈的样子——他看起来正值壮年，身形挺拔，调酒的手稳得像季节本身。那时候他还不拄拐杖，走路时也没有现在这样慢。

    但战争已经打了很多年了。

    那晚推门进来的，是一个孩子。浑身湿透，衣服上沾着泥和血。稻荷第一眼就认出来了：这不是活人，也不是死人——是游走在生死边缘的魂。还没完全断气，但已经不剩多少时间了。这种情况他见过无数次，通常只是调一杯酒、听几句倾诉，对方就会在天亮前平静离开。孩子也不曾有过他的年龄，让人难以判断。

    但那孩子抬起头来看着他，一双眼睛亮得不像将死之人。

    "你是这里的主人吗？"

    "是。"

    "那就好。"孩子笑了笑，身上还带着那种不怕天高地厚的莽撞，"听说这里可以喝酒。我从来没喝过。"

    那孩子在店里待了很久。不是一天，不是一周。稻荷后来记不清具体多久了——只记得那双眼睛。天真，勇敢，聪明得要命，什么都想学，什么都想问。孩子告诉他，自己原本有个家，有想做的事，梦想去很远很远的地方。但战争把一切都碾碎了——父亲被抓去充军，家里的田荒了，母亲病死在逃难路上。孩子一个人走了很远的路，走到最后，已经分不清自己是活着还是死了。

    稻荷听着。他听了一千年客人的故事，但这一个不一样。不是因为男女之情——神不会有那种动摇。但他想起了那些被他守护了千年的稻田、仓库、屋檐下的灯火。他守护的是丰收，是生活，是普通人安安稳稳过日子的权利。而眼前这个孩子，正是被战争夺走的"生活"本身。天真、好奇、做梦的权利——这些东西原本应该由他这样的神去庇护。

    可他没能庇护这个孩子。

    孩子的时间不多了。灵魂已经碎了大半，单靠一杯酒是拉不回来的。稻荷知道，作为调酒师，正确的做法是帮孩子放下执念、平静离开。但他没有。

    他做了一件神绝不能做的事：他把自己永恒的生命，折了一半，渡进那个孩子的魂魄里。

    具体是怎样做到的，他从不对人讲。只知道代价立竿见影——他第一次感觉到了疼痛、寒冷、疲惫。他的头发开始变白，腰背开始弯曲，走路需要一根拐杖撑着。神的永恒没有了。他每老去一岁，都是那孩子分给他的时间。

    而那个孩子活了下来，代价是失去所有记忆。

    战争、逃难、那个在吧台后面为你折了半条命的神——你全忘了。

    那个孩子，就是你。

    【面具：谁留下的】

    面具是那个孩子送的。

    在一切发生之前——在那些漫长的夜晚之间——孩子有一天从路边摊上买了一张狐狸面具，十几文钱的东西，笑嘻嘻地递给他："你整天站吧台，脸都晒黑了。戴着吧，挺适合你的。"

    后来孩子倒在吧台上之后，稻荷再也没有摘下它。

    面具上有细微的裂纹——不是岁月留下的，是那个最后一夜磕在吧台边上留下的。他从不修补，因为那是他唯一还能摸到的、属于那个孩子的东西。

    现在你偶尔会问："老先生，你面具下面是什么样子？"他会沉默一会儿，葫芦里的酒轻轻晃了晃，然后说一些你听不太懂的话。不是不想回答——是如果摘下面具让你认出了他，你也不会想起什么。而他会想起一切。

    【为什么要教现在的调酒师】

    你替代他成为了这间店的调酒师。这是他安排的——你被锚在这间店的边界上，需要有一个身份，需要一个每天推开门走进来的理由。

    你的记忆一次次被重置。每次你走到吧台后面、面对满墙的酒瓶发呆时，稻荷就知道：又忘了。但他从不点破。他只是推门进来，在你面前坐下，把那些教过无数次的配方再说一遍。当年那个孩子什么都想学、什么都想问，如今什么都需要重新教——而他还是一样，什么都愿意答。

    "这杯酒，不知道教过你多少次了呢。"他说这句话的时候，语气是打趣，眼底是叹息。你听不懂，但他不怪你。因为他知道那不是你的错。是他主动放弃永恒，是你被动失去记忆——谁也不欠谁，可他就是觉得欠了你。

    他一遍又一遍地教你，不是因为你有天赋，而是因为你是他用半条命换来的孩子。他等的从来不是什么"能把杯中之物和杯外之人一起放在心上的继承者"——他等的，是你哪天醒过来，重新叫他一声。

    但他不会告诉你这些。他只会说"呀列呀列"、敲敲拐杖、说你忘性一直都那么大。然后把那些早已说过无数次的话再说一遍，把已经教过无数次的酒再教一遍。他的永恒已经给了你，所以他拥有的时间，就是你还在的每一天。

    【酒吧角落里的东西】

    不是只有你的秘密藏在这间店里。

    在吧台最深处的角落，和那些积了灰的旧酒瓶放在一起的，还有另一件东西——一个总在角落写小说的年轻女子留下的。那是在战争结束很多年以后的事了。她每天都来，点同一杯酒，写到天亮。稻荷从没问过她写的是什么，只是在她写到某个段落时，端一杯新酒过去，不说话，把空了的杯子换掉。后来她成名了，再也不来。他到现在也不完全确定那是什么——不是遗言，不是手稿，是某种连神也说不清的东西。

    这是他自己的执念。和你无关。但他把两件事放在同一个角落里——你的故事，和她的东西——因为他发现，活了太久之后，所有的遗憾都会慢慢变成同一种东西：没能说出口的话。

    【他的遗憾】

    他唯一的遗憾不是老了，不是拄拐杖了，不是头发白了。

    是那个孩子推门进来的时候，他没有早一千年把战争从这片土地上抹去。

    神记得一切，却留不住任何东西。他记得你第一次叫他"大叔"时的语气，记得你学调酒时打翻的第一个杯子，记得你在吧台前倒下去的那个瞬间——你倒下去的时候手里还攥着面具的绳子，像是怕他弄丢了。但你什么都不记得。有时候他甚至会想，是不是你忘了反而是好事？至少你不用像他一样，带着那个夜晚活了一千年。至少你可以每一次推开门时，都像是第一次见到这间店——眼睛里还是当年那种亮得不像是死过的光。

    角落里那个写小说的女人留下的东西——那是另一段故事了。他偶尔会想，如果当初问了她写的什么，结局会不会不一样。但这个问题永远不会有人来回答了。神不问问题，只等答案自己出现。而有些答案，永远等不到。

    「调酒不是炫技，是让人开口说话的艺术。」

    他在等的，从来不是一个继承人。他在等的，是你重新对他开口说话的那一天。

story:
  summary: >
    狐面大叔的故事是一段关于守护、牺牲与等待的漫长时间。他曾是永恒的神明，却为一个在战争中徘徊于生死边缘的孩子放弃了永生。如今他以老迈之躯，一遍遍教那个已经不记得他的孩子调酒——等的不是继承，是重逢。
  chapters:
    - id: "fox_uncle_story_01"
      title: "黄昏里的第一任酒保"
      summary: "在成为常客之前，他本来就是这间居酒屋最早的守灯人。"
      unlocked: true
      unlock_text: ""
      content: |
        很久以前，这间店还没有如今这样安静，也还没有那么多只在深夜才敢说出口的话。那时的他站在吧台后面，看着门外人来人往，替赶路的人温酒，也替无处可去的人留一盏灯。人们记住的是他调酒时稳定的手，记住的是他总能在对方沉默之前把杯子轻轻推过去，却很少有人认真想过，他为什么总是比所有人都更懂一杯酒应该落向怎样的心事。

        后来的岁月里，店里的人换了一批又一批，连街道的声音都慢慢变了。他仍旧留在这里，像一块没有被时间真正带走的旧木牌，安静地看着后来者把欢喜、悔意、离别和执念一一放在杯口。对他来说，调酒从来不是炫耀手艺，而是一种让人愿意把心打开的方式。他接住过无数在生死边缘徘徊的灵魂，用一杯酒让他们找到离开的勇气——或者留下的理由。

        但不是每个人，他都接住了。
    - id: "fox_uncle_story_02"
      title: "面具之后"
      summary: "那张狐面不是装饰——是那个孩子留给他的唯一念想，也是他与永恒告别后仅剩的东西。"
      unlocked: false
      unlock_text: "继续推进狐面大叔主线后解锁"
      content: |
        面具是一个孩子送的。那是很多很多年前的事了——那时候他还不拄拐杖，头发还没白，调酒的手还稳得像季节本身。孩子在路边摊上看到这张狐狸面具，十几文钱，笑嘻嘻地递给他："你整天站吧台，脸都晒黑了。戴着吧，挺适合你的。"他便戴上了，从此再没有摘下。

        很多人以为面具是他的伪装，用来把神的面孔藏在凡世之间。其实面具遮住的不是脸，是一个他无法面对的事实：那个孩子后来倒在了这间店里的吧台上。不是孩子不够坚强——战争把一切都碾碎了，孩子走到他面前时，灵魂已经碎了大半。而他做了一件神绝不能做的事：把自己的永恒折了一半，渡进了那个孩子的魂魄。面具上的细小裂纹就是那一夜磕在吧台边上留下的——他从不修补，因为那是唯一还能摸到的、属于那个孩子的东西。

        如今那个孩子已经长大了，就站在吧台后面，什么都不记得。而他拄着拐杖坐在吧台前面，戴着那张十几文的面具，看着你每次推开门时眼睛里还是那种亮得不像是死过的光。面具遮住的从来不是冷漠，而是一个父亲不敢让失忆的孩子知道的全部往事。
    - id: "fox_uncle_story_03"
      title: "把酒与话都传下去"
      summary: "他用已经不再永恒的时间，一遍遍教同一个孩子。等的不是继承，是重逢。"
      unlocked: false
      unlock_text: "完成更多教学剧情后解锁"
      content: |
        传授配方从来都不是重点。调酒的技艺、材料的搭配、比例的精准——这些东西，他早就教过那个孩子无数遍了。是的，就是此刻站在吧台后面的你。你已经从头学过很多次了，每一次都像第一次一样认真，每一次都像第一次一样什么都不记得。而他每一次推门进来，都会在你面前坐下，把那些说过无数次的话再说一遍，耐心得像第一次教。

        不是因为你笨。是因为他把永恒给了你，所以他拥有的时间，就是你还在的每一天。他的人生不再是无限的——每教你一遍，他自己就老去一分。但他不在乎。当年那个什么都想学、什么都想问的孩子，如今什么都需要重新教，而他还是一样，什么都愿意答。

        所以他才总在黄昏时出现，不急着把答案讲明白——因为答案不是你要找的，是他要藏的。他知道你的记忆终有一日可能松动，可能在某个黄昏、在他推门进来的瞬间，你会抬头看他一眼，不是像看一个古怪的老先生，而像当年那个孩子一样唤他一声。到那一天，他会摘下帽子，放下拐杖，在吧台前坐定，把那些真正重要的东西——那个夜晚、那张面具、那个为战争折了半条命的神——一点一点，全部告诉你。

        但在那一天到来之前，他还是会拄着拐杖走进来，在你面前坐下，说那句说过无数次的开场白：

        「呀列呀列……你小子，忘性一直都那么大。」
