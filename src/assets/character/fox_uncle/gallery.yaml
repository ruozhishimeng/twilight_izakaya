character_id: fox_uncle
base_info:
  name: "狐面大叔"
  age: "未知"
  description: 头戴狐狸面具的老者，拄着拐杖慢步走入。深蓝色的作务衣洗得发白，腰间挂着一个朱红色的大葫芦。脸上的面具歪歪的，像是随手一放。身上的气息...是陈年的酒香。
  type: "鬼神"
  short_story: |
    他是这间店的第一任酒保，稻荷神。千年前为拯救一个被战争摧残、徘徊于生死边缘的孩子，放弃了永恒的生命。
    如今他化作人形、拄着拐杖在黄昏时分来访，一遍遍教那个已经不记得他的孩子调酒。
    脸上的狐狸面具是那个孩子当年送的，十几文的东西，他戴了一千年。等的不是继承人，是重逢。
    「调酒不是炫技，是让人开口说话的艺术。」他在等那个孩子重新对他开口说话的那一天。
    

profile_sections:
  - id: "appearance_basic"
    title: "神秘的狐面老者"
    content: |
      头戴狐狸面具的老者，拄着拐杖慢步走入。
      深蓝色的作务衣洗得发白，腰间挂着一个朱红色的大葫芦。
      脸上的面具歪歪的，像是随手一放。
      身上的气息...是陈年的酒香。
    unlock_condition: "none"
    depth_level: 1

  - id: "identity_hint"
    title: "袖口的秘密"
    content: |
      仔细观察发现他袖口有金色的稻穗刺绣。
      金色的稻穗绣在深蓝布料上，低调却醒目。
      稻穗...丰收的象征，与某种古老的神职有关。
    unlock_condition: "obs_sleeve"
    depth_level: 2

  - id: "identity_reveal"
    title: "居酒屋的前辈"
    content: |
      他是这间店的第一任酒保，如今化作人形来访。
      袖口的稻穗刺绣透露着他的身份——稻荷神，丰收与商业之神。
      但如今的他已非永恒之身。千年前他为救一个孩子放弃了永生，
      现在的白发与拐杖，都是那次牺牲的代价。
    unlock_condition: "fox_uncle_phase_2_complete"
    depth_level: 2

  - id: "teaching_wisdom"
    title: "守护者的传承"
    content: |
      他的教学不止于配方，更在于做人的道理。
      「调酒不是炫技，是让人开口说话的艺术。」
      他一遍遍教同一个人——那个他用半条命换来的孩子。孩子的失忆
      是复生的代价，而他每一次重教，都是无声的守护。
      照顾客人就像调酒——有时候，少就是多。有些话，不说比说了更难。
    unlock_condition: "fox_uncle_phase_3_complete"
    depth_level: 3

  - id: "true_god_form"
    title: "稻荷神的守护"
    content: |
      他即是稻荷神本身，丰收与商业的守护者。
      千年前，他为拯救一个被战争碾碎的孩子，放弃了永恒的生命。
      从此他不再是永恒之神——他会老，会累，会拄拐杖。
      如今他化作人形在黄昏时分来访，一遍遍教那个已经不记得他的孩子调酒。
      不为别的，只为等那个孩子在某个黄昏，重新叫他一声。
    unlock_condition: "fox_uncle_phase_3_complete"
    depth_level: 3
