    script_flow:
      - type: inner
        content:
          - 我捧起这杯酒，冰块在水面浮动，散发出淡淡的清香。
          - 在刚才的过程中，我自己的手似乎有些肌肉记忆，动作并不生疏。
      - type: env
        content:
          - 大叔接过酒杯，轻轻抿了一口。
      - type: npc
        content:
          - 「不错...这杯纯米嗨棒，清酒的甘甜与苏打水的清爽恰到好处。」
          - 他放下酒杯，脸上露出满意的神情。
      - type: npc
        content:
          - 「小子，不错。你果然还是那个小毛头啊！」
    player_options:
      - option: 谢谢夸奖
        text: 「谢谢...夸奖...我应该是第一次调...」
