    script_flow:
      - type: env
        content:
          - 大叔收起袖口，熟练的操起钢制调酒瓶和量杯，手巧的不像位老人。
    next_node: fox_uncle_teaching_01_mixing
    teaching:
      recipe:
        id: R021
        name: 纯米嗨棒
        ingredients:
          - 纯米清酒 (bj01)
          - 苏打水 (m01)
        formula:
          - bj01
          - m01
        steps:
          - 「纯米清酒是底色，它代表平淡的生活。」
          - 「苏打水添一丝清爽，不抢戏。」
          - 「1:2的比例，搅拌即可。」
      mixing_steps_display:
        - 取纯米清酒作为底色
        - 加入苏打水1:2
        - 轻轻搅拌即可
      game_action:
        trigger: on_teaching_start
        action: ENTER_MIXING_MODE
        params:
          recipe_id: R021
          show_steps: true
      tip: 「日式调酒的精髓在于平淡。不要急于加太多风味，先学会欣赏简单之美。」
 
 
