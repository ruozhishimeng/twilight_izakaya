character_id: yuki
base_info:
  name: "小雪"
  real_name: "晴山 雪 (Haruyama Yuki)"
  age: 18
  occupation: "高中生 / 钢琴天才"
  identity: |
    小雪，18岁，晴山家的最后一个孩子。曾在墨田区女子高中就读。
    她极具钢琴天赋，从未受过正式训练，却能凭听觉在琴键上复现任何听到的旋律。
    她的哥哥阿相在送她18岁生日礼物的路上遭遇车祸，从此她被困在那个雨夜。
    她不相信死亡，只相信"寻找"。
  description: |
    一个湿透的水手服少女站在门口。深蓝色的制服贴在身上，像是刚刚淋了一场暴雨。
    她的眼睛空洞却又执着，手指偶尔会在空气中轻轻弹动——像在弹奏一首听不见的曲子。
    右腕系着一根褪色的红毛线绳。
  type: "滞留者"
  personality: "极度安静、克制、病态的执拗、拒绝承认失去"
  short_story: |
    晴山家曾是墨田区经营"晴山染工"的蓝染小户，在电车轨道旁经营了三代。
    父亲因病早逝，母亲精神崩溃后将所有红色染料倒入隅田川，晴山染工从此衰落。
    兄妹俩守着祖母留下的老破小相依为命。哥哥阿相14岁辍学打工，把所有省下的钱都给了小雪读书。
    小雪极具钢琴天赋，在邻居佐藤奶奶的钢琴店学会了《月光》《致爱丽丝》《小星星变奏曲》。
    阿相发誓要为她送出一架有她名字的钢琴。18岁生日那天，阿相去取定制音乐盒，却再也没能回来。

death_cause: "她的身体留在了那个雨夜。真正的死亡，是因为没有人来告诉她真相。"
core_item: "音乐盒碎片"
lingering_regret: "只要我不停止寻找，失去的人就不算真正消失。"

story:
  summary: >
    小雪的故事是一段被等待、误解与失去层层包裹的青春残响。她的执念不是因为不愿放手，而是因为从来没有人真正把答案交到她手里。
  chapters:
    - id: "yuki_story_01"
      title: "晴山染工的女儿"
      summary: "在一切崩塌之前，她也曾只是一个会练琴、会等待生日礼物的普通少女。"
      unlocked: true
      unlock_text: ""
      content: |
        小雪出生在一个并不富裕却曾经温暖的家里。家中的染坊不算显赫，父亲手上常年带着颜料，母亲忙碌而安静，哥哥总是嘴硬心软。她是在染料气味、老房子的木地板声和街道边电车呼啸而过的震动里长大的孩子。那个时候，生活虽然并不宽裕，却仍然保留着某种可以被称作“明天还会更好”的朴素信念。

        她很早就显露出弹钢琴的天赋，也因此在很长一段时间里，成了家中所有希望最柔软、也最明亮的寄托。父亲离世之后，家里开始一点点倾斜，母亲的精神逐渐崩坏，染坊也再难维持。可即便是在那样的日子里，哥哥还是想方设法把她留在钢琴前，让她继续学、继续弹、继续相信自己有资格走向和这条旧街不一样的未来。对那时的小雪来说，哥哥并不是一个会说漂亮话的人，却始终像一道不声不响挡在前面的墙，让她可以暂时不用看见外面的风雨。
    - id: "yuki_story_02"
      title: "没有回来的人"
      summary: "她的人生真正停下来的那天，并不是死亡发生的那一刻，而是等待开始之后。"
      unlocked: false
      unlock_text: "继续推进小雪主线后解锁"
      content: |
        十八岁生日原本应该是一个值得期待的日子。小雪知道哥哥最近比平时更忙，也知道他总像藏着什么似的，却怎么也没有想到，那份还没来得及送出的心意，会把她之后所有的人生都钉死在原地。哥哥出门之后再也没有回来，没有告别，没有解释，甚至没有一个明确到足以让人死心的结局。留下来的只有一段被中断的时间，以及一个不断重复的问题：他到底去了哪里。

        最可怕的从来不是痛快的失去，而是没有终点的等待。因为没有人告诉她真相，所以她不能好好难过，也不能真正放下。她只能反复把那些细节捡起来，一遍遍确认那天之前有没有哪句话被自己听漏，有没有哪个眼神其实藏着预兆。等待本身慢慢变成了她活着的方式，也变成了她死后仍不肯松开的执念。对旁人来说，她像是被困在某个雨夜里的幽灵；可对她自己来说，她只是还没有等到那个本该回来的人。
    - id: "yuki_story_03"
      title: "月光还在响"
      summary: "她执着寻找的并不只是哥哥，也是一个能够让过去真正停下来的答案。"
      unlocked: false
      unlock_text: "完成更多小雪相关剧情后解锁"
      content: |
        钢琴、音乐盒、生日、哥哥，这些词在她心里早就不是分开的东西了。它们像同一段旋律的不同音符，一旦响起，过去就会整片地涌回来。她记得自己练琴时窗外的光，记得佐藤奶奶店里旧琴键的触感，记得哥哥明明什么都不懂，却还是装作很懂地站在旁边听她弹完一整首曲子。那些记忆太鲜明，鲜明到她无法相信那个人真的会无声无息地从世界上消失。

        所以她才一直寻找。不是因为不知道失去是什么，而是因为失去没有被好好命名。只要真相一天没有到来，她就一天无法承认这段关系已经结束。她留在人间与彼岸之间，像把自己也变成了一段未完成的旋律，固执地等待最后一个音落下。或许她真正想要的，从来不只是找回哥哥，而是找到一个能让那段青春、那场等待、那份爱意终于得到安放的位置。

