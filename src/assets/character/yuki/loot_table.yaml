# 救赎总结
redemption:
  true_story: |
    小雪，晴山家的最后一个孩子。她的哥哥阿相在送她18岁生日礼物的路上遭遇车祸，再也没有回来。

    阿相14岁辍学打工，把所有省下的钱都给了小雪读书。他发誓要为她买一架有她名字的钢琴。18岁生日那天，他去取定制音乐盒，却再也没能回来。

    从那天起，小雪就被困在那个雨夜。湿透的水手服再也没有干过。她每天都会出门，寻找哥哥和走丢的黑猫小墨。

    但哥哥已经不在了。小墨也被附近的好心人收养了。只有她，还留在那个雨夜，等待一个永远不会到来的天黑。

  lesson: |
    有些失去，是活着的人必须背负的重量。但爱不会消失，它会变成另一种形式，陪伴着我们。
    小雪终于明白，哥哥希望她继续走下去，不是为了他，是为了她自己。
    那场雨，终于停了。
