character_id: homesick_grandma
base_info:
  name: "怀念故乡的老奶奶"
  age: 72
  occupation: "退休"
  description: "一位满头银发的老奶奶，慢慢地坐在吧台前。眼神有些恍惚，像是在回忆什么遥远的事情。"
  type: "普通人"
  short_story: |
    她老家在九州，年轻时嫁到了东京。
    几十年来，她总是会想起老家门前的那棵梅子树，和妈妈亲手酿的梅酒。
    酸酸甜甜的...那是夏天的味道，是故乡的味道，是再也回不去的从前。

profile_sections:
  - id: "homesick_grandma_story_01"
    title: "离开九州以后"
    summary: "她在东京生活了很多年，却始终没有真正把故乡从心里搬走。"
    content: |
      她年轻时从九州嫁到东京，带着一只不大的箱子，也带着对新生活的想象。最开始的那些年，她其实并不觉得自己是在“离开”。她忙着适应城市，忙着照料家庭，忙着把日子一点点过稳。街道越来越熟，口音慢慢变淡，连季节的变化都似乎和老家有了新的区别。她以为只要时间够久，人总会习惯新的地方，总会把旧的部分安静地收好。

      可真正让人明白“故乡”这两个字分量的，往往不是离开的那一天，而是很多年后某个再普通不过的时刻。也许是一阵潮湿的晚风，也许是一口熟悉的酸甜，也许只是别人无意间提起某种家常做法。那些细碎的东西会在瞬间把人拉回从前，让她忽然想起门前的梅子树，想起母亲把青梅洗净、晾干、装坛的背影，想起夏天午后黏稠而明亮的光。原来真正没有离开的，从来不是身体，而是记忆。
    unlock_condition: "none"
    depth_level: 1

  - id: "homesick_grandma_story_02"
    title: "梅子酒的味道"
    summary: "她想念的并不只是家乡的风景，而是那个还能轻易被味道安慰的自己。"
    content: |
      人上了年纪之后，很多情绪都不再像年轻时那样锋利。她不会总把想家挂在嘴边，也不会轻易说自己有多寂寞。可有些事情不是不提起就不存在。她在东京生活了几十年，周围的人、熟悉的路线、常去的店都已经变成了如今人生的一部分，可那股关于梅子酒的记忆却从来没有淡过。酸酸甜甜的味道一旦入口，心里那扇通往旧时光的门就会自己打开。

      她怀念的其实不只是酒，而是那种被照顾、被包裹、被某个熟悉世界轻轻接住的感觉。那是年轻时的夏天，是母亲的手，是还来得及回头的日子。现在的她也知道，故乡并不会真的停在原地等人回来，记忆里的那棵树、那扇门、那个人，或许早就都变了样。可正因为如此，她才更需要在某个夜晚、某一杯酒里，短暂地把那份回不去的温柔重新找回来。
    unlock_condition: "homesick_grandma_story_02"
    depth_level: 2
