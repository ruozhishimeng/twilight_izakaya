character_id: retired_grandpa
base_info:
  name: "庆祝退休的老爷爷"
  age: 65
  occupation: "退休公务员"
  description: "一位精神矍铄的老人，西装革履，胸前别着一朵红花。眼神里有光，像是终于卸下了什么重担。"
  type: "普通人"
  personality: "豪爽、健谈、喜欢回忆往事"
  short_story: |
    他在政府部门工作了四十年，按部就班，从不出格。
    今天是他退休的日子，四十年的工作终于结束了。
    他终于可以换个活法了。

story:
  summary: >
    退休老人的故事并不沉重，却带着一种迟来的空白感。他的人生一直过得很规整，直到终于停下来时，才发现自己从来没有认真想过“以后要怎么活”。
  chapters:
    - id: "retired_grandpa_story_01"
      title: "四十年之后"
      summary: "按部就班地工作了四十年，真正退休那天，他反而有些无所适从。"
      unlocked: true
      unlock_text: ""
      content: |
        他在政府部门工作了整整四十年。准时上班，按流程办事，不轻易出错，也不主动给别人添麻烦。年轻的时候，这样的生活曾让他觉得踏实。工作稳定、收入稳定、人生节奏稳定，仿佛只要一步一步走下去，就能自然抵达某种被称作“圆满”的终点。很多年里，他也的确是这样要求自己的。能忍的就忍，能让的就让，把责任做完，把日子过稳，似乎就已经足够。

        可真正到了退休那一天，想象中的轻松并没有如约而至。没有闹钟催促，没有文件等着处理，没有人来确认他今天有没有准时出现，时间一下子变得空了，而他却忽然不知道该把自己放在哪里。过去四十年里，他把“工作中的自己”经营得井井有条，却几乎没有认真面对过“离开工作以后还剩下什么”。原来人并不会因为把一件事做得足够久，就自动学会如何面对结束。
    - id: "retired_grandpa_story_02"
      title: "换个活法"
      summary: "他想试着过一种不必再被规章表格定义的生活，却还在摸索第一步。"
      unlocked: false
      unlock_text: "继续推进这位客人的剧情后解锁"
      content: |
        退休之后，周围的人都在恭喜他，说终于可以清闲了，终于能够享受人生了。可“享受人生”这几个字听上去轻巧，真正落到一个习惯了按日程表生活的人身上，却反而让人无所适从。他不是没有想过那些俗套而美好的安排，去旅行、学点新东西、晚一点起床、慢一点吃饭。可当时间真正交到自己手里，他才发现，自己并不擅长使用自由。

        所以他才来到居酒屋，点一杯最熟悉、最简单的酒。那不是因为他没有尝新的勇气，而是因为他还需要一点点熟悉的支点，来确认自己并没有被人生下一阶段彻底抛下。也许所谓“换个活法”从来不是一下子把一切都推翻，而是先允许自己在结束之后有一段笨拙的适应期。承认迷茫，承认迟缓，承认自己在重新学习如何度过一天。对他来说，这或许才是真正退休后的第一堂课。
