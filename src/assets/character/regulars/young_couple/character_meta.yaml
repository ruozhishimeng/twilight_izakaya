character_id: young_couple
base_info:
  name: "年轻情侣"
  age: 24
  occupation: "公司职员/大学生"
  description: "一对年轻情侣，男孩略显拘谨，女孩更大方一些。两人十指交扣，感情看起来很好。"
  type: "普通人"
  personality: "甜蜜、紧张、男生略显拘谨，女生更大方"
  short_story: |
    他们在一起两年了，今晚是男孩第一次请女孩来居酒屋。
    男孩想要一个"教父"式的承诺，却笨拙地只能用酒名来表达。
    爱情的味道，大概就是这样苦涩又甜蜜的吧。

story:
  summary: >
    年轻情侣的故事并不复杂，却带着恋爱最初期特有的莽撞与真心。他们还不太会表达爱，却已经在努力用各自笨拙的方式靠近彼此。
  chapters:
    - id: "young_couple_story_01"
      title: "第一次一起进居酒屋"
      summary: "对他们来说，这并不是一次普通约会，而是一次试着认真靠近彼此的冒险。"
      unlocked: true
      unlock_text: ""
      content: |
        他们在一起已经两年，说长不长，说短也不算短。熟悉早就有了，可真正意义上的“确认”，却似乎总差一点火候。男孩想把很多情绪说出来，想让女孩知道自己不是随便玩玩，也不是只会在日常里顺着关系往前走的人。可真正面对她时，那些原本想好的句子又总是卡住，变成笨拙的笑、尴尬的停顿，和一些不合时宜的小动作。

        所以他才会把这次来居酒屋看得那么重要。这里不像白天的街道那样明亮，也不像咖啡馆那样容易把情绪说得太直白。昏黄的灯光和酒的名字像一层缓冲，让那些原本说不出口的话有了借物传情的可能。他带她来，不只是想制造一点特别的回忆，更像是在为自己争取一次机会，一次把认真与喜欢都慢慢放到桌面上的机会。
    - id: "young_couple_story_02"
      title: "笨拙的承诺"
      summary: "他们都还年轻，还不懂如何说爱，却已经开始尝试对未来做出小小的许诺。"
      unlocked: false
      unlock_text: "继续推进这位客人的剧情后解锁"
      content: |
        恋爱里最动人的部分，很多时候并不是那些说得特别漂亮的话，而是两个都还不够成熟的人，愿意试着把自己认真交出去。男孩希望用一种足够郑重的方式表达心意，于是才会想到“教父”这样的名字，仿佛借一杯酒，就能替自己说出那些太过用力反而不好意思出口的话。女孩未必完全听得懂他那些拐弯抹角的小心思，却也能从他的紧张和认真里，察觉到那份不想敷衍的心意。

        他们的未来当然还很长，也还会有许多现实的问题等着慢慢碰撞。年轻的爱从来不会因为真心就自动拥有成熟的形状，它会犹豫、会误解、会因为表达能力不足而显得可笑。可也正因为这样，这种带着青涩、带着用力过猛、带着一点点慌张的靠近，才显得格外真。也许他们还不知道怎样把承诺说得漂亮，但至少在这个夜晚，他们已经开始尝试把“我们”这两个字认真地放进口中。
