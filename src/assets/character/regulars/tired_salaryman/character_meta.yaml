character_id: tired_salaryman
base_info:
  name: "疲惫的上班族"
  age: 38
  occupation: "IT工程师"
  description: "一个疲惫的男人，领带松垮垮地挂在脖子上，西装皱巴巴的。眼睛下面有深深的黑眼圈，像是很久没有睡好了。"
  type: "普通人"
  personality: "沉默寡言、疲惫、但保持基本的礼貌"
  short_story: |
    他在一家IT公司工作了十年，每天加班到深夜。
    今天又加班到很晚，他只是想找个地方喝一杯，忘记今天的疲惫。
    明天大概还是会加班吧。

story:
  summary: >
    疲惫上班族的故事并不戏剧化，却非常真实。他没有惊天动地的苦难，只是在一成不变的消耗里，慢慢忘记了自己原本想成为什么样的人。
  chapters:
    - id: "tired_salaryman_story_01"
      title: "加班之后"
      summary: "他每天都像是被工作拧干了力气，只剩下惯性把身体拖到夜里。"
      unlocked: true
      unlock_text: ""
      content: |
        他在一家 IT 公司待了很多年，最初进去的时候，也不是没有热情。项目、升职、未来、城市生活，这些词曾经都带着一点向上的光，像在告诉他，只要熬一熬，很多想要的东西迟早会轮到自己。可真正走进去之后，日子却慢慢变成了另一种样子。会议一场接一场，需求改了一版又一版，加班像理所当然，疲惫像空气一样填满每个工作日的缝隙。

        久而久之，他不再去想自己到底喜不喜欢这份工作，也不再追问“这样过下去到底是为了什么”。人最容易被磨掉的并不是力气，而是追问的能力。当每一天都过得太相似，连抱怨都会显得奢侈。他来到居酒屋时，常常只是想找个地方坐一会儿，让脑子里那些没完没了的任务提示暂时安静一下。可真正让人难受的，从来不只是累，而是连累都变得没有意义。
    - id: "tired_salaryman_story_02"
      title: "明天还要继续"
      summary: "他知道明天大概率还是同样的一天，却还是想在今晚先把自己找回来一点。"
      unlocked: false
      unlock_text: "继续推进这位客人的剧情后解锁"
      content: |
        他并不是不知道自己正在被这样的生活一点点掏空。只是很多时候，人并不是因为看不清才留在原地，而是因为看清了以后，也暂时找不到能走出去的办法。租金、账单、绩效、下一轮考核，所有事情都像一根根细线，把他牢牢系在“明天还得继续”的日常里。他没有资格轻易辞职，也很难把疲惫讲给别人听，因为在这个城市里，太多人都在过着类似的生活，连崩溃都显得不够特别。

        所以他才会想要一杯能让人短暂忘记今天的酒。不是为了真正逃走，而是为了在彻底睡着之前，至少还能感受到自己仍旧是一个有情绪、有感受的人。也许到了明天，他还是会准时出现在工位上，还是会面对同样的屏幕和同样的灯光。但至少在这个夜晚，他愿意承认自己已经很累了，而这份承认本身，也许就是他还没有完全麻木的证明。
