character_id: tired_salaryman
nodes:
  - event_id: tired_salaryman_001_dialogue_main
    trigger_condition:
      need_event: []
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - “叮铃~”  门口的风铃再次响起。
          - 一位身穿西装、领带松垮的中年男子走了进来。
          - 他看起来疲惫不堪，肩膀微微耸起，领带松垮垮地挂在脖子上，眼神空洞。
          - 他径直走向吧台，没有环顾四周，找了个离你很远的位置坐下，重重地叹了口气。
          - 吧台上的酒单被他随意翻看了几页，最后放下了。
          - 他没有说话，只是呆呆的看着酒单前面的地方，可那里什么都没有。
          - 过了一会儿，他终于开口了。
      - type: npc
        content:
          - 「来一杯...能让我忘记...忘记那些东西的味道。」
      - type: env
        content:
          - 他的声音低沉沙哑，再加上位置离你很远，几乎快听不见了。
          - 你缓缓走过去试图离男人近一点。
      - type: inner
        content:
          - 他看上去很累，要不给他一杯刚刚学会的纯米嗨棒...其他的我也不太会...
    player_options:
      - option: 「纯米嗨棒」
        text: 「欢迎光临，先生，给您来一杯纯米嗨棒怎么样？」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「......那是什么...我试试...」
        next_node: tired_salaryman_001_mixing
        

  - event_id: tired_salaryman_001_mixing
    trigger_condition:
      need_event:
        - tired_salaryman_001_dialogue_main
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 调酒进行中...
    player_options: []
    next_node: null
    drink_request:
      request_text: "纯米嗨棒...是什么酒..."
      player_prompt: "他嘴上只提了一句“纯米嗨棒”，但真正想要的，应该是一杯能让人稍微松一口气的酒。我就顺着这个方向试试。"
      preferred_drink:
        id: R021
        name: 纯米嗨棒
        formula:
          - bj01
          - m01
      steps:
        - 取纯米清酒作为底色
        - 加入苏打水1:2
        - 轻轻搅拌即可
    on_mixing_complete: tired_salaryman_001_result
    on_mixing_fail: tired_salaryman_001_fail

  - event_id: tired_salaryman_001_result
    trigger_condition:
      need_event:
        - tired_salaryman_001_mixing
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他接过酒杯，一口喝了大半。
      - type: npc
        content:
          - 「...啊。这酒，怎么，怎么这么可口。」
          - 「这酒...」
          - 「苦涩，但习惯了。」
      - type: npc
        content:
          - 「你知道吗...加班到凌晨三点的时候，站在空荡荡的地铁站里。」
          - 「看着末班车远去，忽然不知道自己这么拼命是为了什么。」
          - 「房贷、孩子的学费、老人的医药费...每一个月都在倒数，每一天都在熬。」
          - 「有时候照镜子，觉得自己像是被抽干了颜色的旧照片。」
      - type: inner
        content:
          - 这位大叔身上的疲惫感太重了...生活的重担压得他喘不过气。
      - type: npc
        content:
          - 「你知道最可怕的是什么吗？」
          - 「是周一早上醒来，发现还有四天才能到周末。」
          - 「每天重复着同样的报表、同样的会议、同样的沉默...」
          - 「我已经想不起来上一次开怀大笑是什么时候了。」
      - type: inner
        content:
          - 也许他只是需要有人倾听。没有人是一座孤岛。
    player_options:
      - option: 「还有甜的时候」
        text: 「生活虽然苦涩，但还有甜的时候。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「...甜？」
          - type: npc
            content:
              - 「你说得对...」
              - 「上周女儿给我画了一张贺卡。」
              - 「上面歪歪扭扭地写着——」
              - 「'爸爸不加班'。」
          - type: inner
            content:
              - 我的心揪了一下。
          - type: npc
            content:
              - 「...她画了我们一家三口。」
              - 「爸爸、妈妈，还有她。」
              - 「我们都在笑。」
              - 「...可是我都不记得了。」
              - 「上一次带她去公园，是什么时候？」
              - 「上一次给她讲睡前故事呢？」
              - 「...我竟然想不起来。」
          - type: inner
            content:
              - 他低下头，肩膀微微颤抖。
              - 我缓缓在他的桌面上放了一沓纸巾。
          - type: npc
            content:
              - 「...谢谢你。」
              - 「...好久没有人听我说这些了。」
              - 「明天...」
              - 「明天一定早点回家。」
      - option: 「你很了不起」
        text: 「能坚持到现在，你已经很了不起了。」
        branch_type: flavor
        script_flow:
          - type: npc
            content:
              - 「...」
          - type: npc
            content:
              - 「...没人这么跟我说过。」
          - type: inner
            content:
              - 他的眼眶红了，但没有哭出来。
              - 中年男人的崩溃，是悄无声息的。
          - type: npc
            content:
              - 「老板只会说，这个月绩效不够。」
              - 「客户只会说，明天就要。」
              - 「老婆会说，你怎么又加班。」
              - 「父母会说，我们不需要你操心。」
              - 「...可是我...」
          - type: inner
            content:
              - 他哽住了，没有说下去。
              - 我给他倒了一杯温水，没有说话。
          - type: npc
            content:
              - 「...谢谢你。」
              - 「很久没有人...肯定过我了。」
              - 「...哪怕只是一句话。」
              - 「...我会记住的。」
      - option: 「再干一杯」
        text: 「来，再干一杯，我请的。」
        branch_type: flavor
        script_flow:
          - type: inner
            content:
              - 也许一杯酒不能解决什么问题，但至少今晚，他不用一个人。
          - type: npc
            content:
              - 「...好。」
          - type: env
            content:
              - 他接过酒杯，没有一口闷，而是慢慢小口抿着。
          - type: npc
            content:
              - 「...你知道吗。」
              - 「我其实...不想来的。」
              - 「但是老婆说，你去吧，这个家需要你挣钱。」
              - 「...可是这个家，需要的不是钱。」
              - 「是...一个能按时回家的爸爸。」
          - type: inner
            content:
              - 酒馆里很安静，只有风铃偶尔轻响。
              - 我们都没有说话。
          - type: npc
            content:
              - 「...今晚...就不想那些烦心事了。」
              - 「就在这里坐一会儿吧。」
              - 「...这酒真温柔。」
              - 「...像小时候妈妈给我热的牛奶。」
      - option: 「明天会更好」
        text: 「明天会更好的。」
        branch_type: flavor
        script_flow:
          - type: inner
            content:
              - 我没说什么大道理，只是轻轻拍了拍他的肩膀。
              - 有些话，不用说太多。
          - type: npc
            content:
              - 「...嗯。」
          - type: env
            content:
              - 他沉默了很久，然后轻轻点了点头。
          - type: npc
            content:
              - 「会吗？」
              - 「...会的吧。」
              - 「...你说的话，我记住了。」
              - 「...谢谢你，小老板。」
          - type: inner
            content:
              - 他站起身，踉跄了一下，扶住了桌子。
              - 「...喝多了。」
              - 「...我该回去了。」
          - type: env
            content:
              - 他走向门口，推开门前回过头来。
          - type: npc
            content:
              - 「...我会...试着早点回家的。」
              - 「...为了她。」
    next_node: tired_salaryman_001_leave

  - event_id: tired_salaryman_001_leave
    trigger_condition:
      need_event:
        - tired_salaryman_001_result
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他站起身，整理了一下松垮的领带。
          - 动作很慢，像是在拖延离开的时间。
      - type: npc
        content:
          - 「...走了。」
      - type: env
        content:
          - 他站在门口，手已经搭在门把上。
          - 却没有推开。
      - type: npc
        content:
          - 「...小老板。」
          - 「我女儿...今年七岁了。」
          - 「她上次过生日...许的愿望是...」
          - 「...希望爸爸能准时回家吃晚饭。」
      - type: env
        content:
          - 他的声音有些哽咽。
          - 手指在门把上攥紧，又松开。
      - type: npc
        content:
          - 「...我...我已经很久没有...」
          - 「没有好好看过她的脸了。」
          - 「每次回家...她都睡了。」
          - 「每次出门...她还没醒。」
      - type: env
        content:
          - 他终于转过身。
          - 那张被生活压得苍老的脸，此刻却有了泪光。
      - type: npc
        content:
          - 「...谢谢你，小老板。」
          - 「今晚这杯酒...我会记得的。」
          - 「...很久没有...这种感觉了。」
          - 「...被人认真倾听的感觉。」
      - type: env
        content:
          - 他深深地鞠了一躬。
          - 动作笨拙，却很真诚。
      - type: npc
        content:
          - 「...这里...很温暖。」
          - 「...下次...我一定再来。」
          - 「...带着女儿的画来给你看。」
      - type: env
        content:
          - 门被轻轻推开。
          - 深夜的风从门缝里溜进来，带着一丝凉意。
          - 他走进了夜色中，身影渐渐消失在昏黄的路灯下。
      - type: inner
        content:
          - 风铃轻响。
          - 吧台上留下的空酒杯，在灯光下泛着微光。
          - 明天...大概还是会加班吧。
          - 报表、会议、客户的电话...
          - 但至少今晚，他在这里找到了片刻的安宁。
          - 也许...这就够了。
          - 他说会带着女儿的画来。
          - ...我等着。
    player_options: []
    next_node: null
    story_unlocks:
      chapters:
        - id: tired_salaryman_story_02
          reason: "第一天疲惫上班族的完整对话、调酒结果与夜末日记都已经落到“为了女儿继续硬撑”的核心情绪上，此时解锁第二篇人物故事，能把玩家对他的理解从表层疲惫推进到更深一层。"
    diary_note: '一个疲惫的中年男人，为了女儿的生日礼物拼命加班。他说女儿的愿望是"爸爸不加班"...这个愿望实现不了，但他还是想努力试试。'

  - event_id: tired_salaryman_001_fail
    trigger_condition:
      need_event:
        - tired_salaryman_001_mixing
      need_time: any
      need_item: []
    script_flow:
      - type: env
        content:
          - 他接过酒杯，苦笑了一下。
      - type: npc
        content:
          - 「这杯酒不是我想要的...但还不错...」
          - 「至少脑子能清醒一点。」
          - 「下次见，调酒师。」
      - type: inner
        content:
          - 他喝完就走了，脚步比来时还要沉重。明天...大概还是会加班吧。
    player_options: []
    next_node: null
    story_unlocks:
      chapters:
        - id: tired_salaryman_story_02
          reason: "即使这次酒没有调对，玩家仍然完整经历了这位上班族的来意、收尾与日记反思。故事解锁应跟随人物当日剧情闭环，而不是绑定单一成功结果。"
    diary_note: '今天调的酒不对，但那个男人还是喝完了。他说"下次见"...希望下次我能调出对的酒，让他真正放松一下。'
