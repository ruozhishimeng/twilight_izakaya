character_id: insomniac_writer
base_info:
  name: "失眠的作家"
  age: 35
  occupation: "自由撰稿人"
  description: "一个双眼布满血丝的男人，眼神锐利但时有温柔。手指总是在敲着什么东西，像是在思考下一个情节。"
  type: "普通人"
  short_story: |
    他是一个自由撰稿人，已经失眠了很多天。
    每天深夜都在赶稿，灵感却总是迟迟不来。
    今晚他又失眠了，只是想找个地方喝一杯，看看能不能找到一点灵感。

profile_sections:
  - id: "insomniac_writer_story_01"
    title: "写不出来的夜晚"
    summary: "他并不是不想写，而是越想写好，就越容易被自己困住。"
    content: |
      成为自由撰稿人这件事，起初听上去甚至有点体面。写字、接稿、自由安排时间，好像生活终于可以按照自己的节奏展开。可真正开始之后，他才发现所谓“自由”，常常只是把所有压力都直接交还给了自己。没有人规定他必须几点起床，却也没有人替他分担截稿日逼近时那种一点点收紧的恐慌。夜晚成了他最熟悉的时段，因为白天的嘈杂过去之后，他终于可以假装自己还有足够时间把那些没写出来的句子补上。

      可越是这样，灵感越像一个故意躲着他的人。电脑屏幕亮着，文档开着，光标一闪一闪，他却越来越难把心里真正想说的话顺利写出来。不是没有语言，而是语言全都堵在某个地方，明明能感觉到它们存在，却怎么也无法把它们排成像样的段落。失眠慢慢成了身体对这种停滞最诚实的反应。他睡不着，不只是因为工作没做完，更因为脑子里始终有一个声音在问：如果连写都写不好，那自己到底还能算什么。
    unlock_condition: "none"
    depth_level: 1

  - id: "insomniac_writer_story_02"
    title: "灵感不是答案"
    summary: "他想找的也许从来不是灵感本身，而是继续相信自己还能写下去的理由。"
    content: |
      很多人以为创作者最大的敌人是没有灵感，可真正把人拖垮的往往不是空白，而是自我怀疑。越写得久，他越清楚自己写不出来并不总是因为题材不够好，也不总是因为时间不够用。更多时候，是因为他开始太在意结果，太在意别人会不会觉得这篇东西不够锋利、不够新、不够值得。于是每一个句子在落下之前都要先接受一次审判，久而久之，手就越来越重，心也越来越不敢往前推。

      所以他来到这里，想要一杯属于深夜的灵感。可真正想寻找的，或许并不是一个突然闪现的绝妙句子，而是某种能让他暂时停止逼迫自己的东西。只要那种绷得太紧的状态能松开一点，只要他还能重新听见自己真实的感受，而不是脑海里无休止的评判声，那么文字也许就还有慢慢回来的可能。灵感不一定能被找回来，但人至少可以先被自己轻轻放过一次。
    unlock_condition: "insomniac_writer_story_02"
    depth_level: 2
